<html lang="fr">

    <title>QuranVision</title>
    
    <link rel="manifest" href="manifest.json?v=8">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        html, body { 
            background: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Empêche le rebond et le scroll global du navigateur */
        }

        /* Utilisation d'un layout Flexbox pour structurer l'écran proprement */
        body {
            display: flex;
            flex-direction: column;
        }

        /* La navigation prend sa place naturelle en haut */
        nav {
            flex-shrink: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        /* La zone de contenu prend TOUT l'espace disponible restant */
        main#main-content {
            flex-grow: 1;
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
            width: 100%;
        }

        /* Barre Audio fixe en bas */
        .audio-fixed-bar {
            flex-shrink: 0;
            background: #020617;
            padding: 12px 16px 20px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 99;
        }

        .audio-player-container {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(52, 211, 153, 0.3);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            max-w: 600px;
            margin: 0 auto;
            padding: 6px 12px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.7);
        }

        audio { height: 36px; width: 100%; outline: none; }
        
        .quran-container { direction: rtl; text-align: right; }
        .quran-arabic { 
            font-family: 'Amiri', serif !important; 
            font-size: 1.6rem !important; 
            line-height: 2.3 !important; 
            display: inline-block;
            width: 100%;
            text-align: center;
            word-spacing: 2px;
        }
        @media (min-width: 768px) {
            .quran-arabic { font-size: 2.4rem !important; line-height: 2.5 !important; word-spacing: 4px; }
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2.5rem;
        }
        
        .phonetic-text.hidden { display: none !important; }
    </style>
</head>

        function initLiveCounter() {
            try {
                firebase.initializeApp(firebaseConfig);
                const database = firebase.database();
                const userRef = database.ref('live_connections/' + deviceSessionId);
                const allUsersRef = database.ref('live_connections');

                userRef.set({ timestamp: Date.now() });
                userRef.onDisconnect().remove();

                allUsersRef.on('value', (snapshot) => {
                    const users = snapshot.val();
                    if (users) {
                        const now = Date.now();
                        let count = 0;
                        Object.keys(users).forEach(key => {
                            if (now - users[key].timestamp < 45000) {
                                count++;
                            }
                        });
                        document.getElementById('liveCounter').textContent = Math.max(0, count);
                    } else {
                        document.getElementById('liveCounter').textContent = "1";
                    }
                });

                setInterval(() => {
                    userRef.set({ timestamp: Date.now() });
                }, 15000);

            } catch (error) {
                console.error("Erreur de connexion live :", error);
                document.getElementById('liveCounter').textContent = "1";
            }
        }

        async function init() {
            initLiveCounter();
            await loadPublishedImages();
            
            surahSelect.innerHTML = '';
            chaptersList.forEach(s => {
                surahSelect.innerHTML += `<option value="${s.id}">${s.id}. ${s.name}</option>`;
            });
            handleSurahChange();
            
            mainContent.addEventListener('scroll', toggleScrollButton);
        }

        function handleSurahChange() {
            const sid = parseInt(surahSelect.value);
            const chapter = chaptersList.find(c => c.id === sid);
            if (chapter) {
                updateVerseSelect(chapter.verses);
            }
        }

        function updateVerseSelect(totalVerses) {
            verseSelect.innerHTML = '<option value="">Verset</option>';
            for (let i = 1; i <= totalVerses; i++) {
                boxValue = i;
                verseSelect.innerHTML += `<option value="${i}">Verset ${i}</option>`;
            }
        }

        function changeSurah(direction) {
            let currentSid = parseInt(surahSelect.value);
            let nextSid = currentSid + direction;

            if (nextSid >= 1 && nextSid <= 114) {
                surahSelect.value = nextSid;
                handleSurahChange();
                loadSurah();
            }
        }

        function toggleScrollButton() {
            if (mainContent.scrollTop > 400) {
                scrollToTopBtn.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
                scrollToTopBtn.classList.add('translate-y-0', 'opacity-100', 'pointer-events-auto');
            } else {
                scrollToTopBtn.classList.remove('translate-y-0', 'opacity-100', 'pointer-events-auto');
                scrollToTopBtn.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
            }
        }

        function scrollToTop() {
            mainContent.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        async function loadSurah() {
            const sid = surahSelect.value;
            if(!sid) return;
            const rid = document.getElementById('reciterSelect').value;
            mainContent.innerHTML = `<div class="py-20 text-emerald-500 animate-bounce text-xl font-bold">CHARGEMENT...</div>`;
            try {
                const res = await fetch(`https://api.quran.com/api/v4/verses/by_chapter/${sid}?language=fr&translations=31,57&fields=text_uthmani&per_page=300`);
                const data = await res.json();
                const audioRes = await fetch(`https://api.quran.com/api/v4/chapter_recitations/${rid}/${sid}`);
                const audioData = await audioRes.json();
                
                updateVerseSelect(data.verses.length);
                renderSurah(data.verses, audioData.audio_file.audio_url);
            } catch (e) { 
                mainContent.innerHTML = "<div class='py-20 text-red-400'>Erreur lors du chargement.</div>"; 
            }
        }

        async function scrollToSelectedVerse() {
            const verseId = verseSelect.value;
            const surahId = surahSelect.value;
            if (!verseId || !surahId) return;

            let targetElement = document.getElementById(`v-${surahId}:${verseId}`);
            
            if (!targetElement) {
                await loadSurah();
                setTimeout(() => {
                    targetElement = document.getElementById(`v-${surahId}:${verseId}`);
                    if (targetElement) targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 800);
            } else {
                targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function handleImageError(imgElement) {
            imgElement.onerror = null; 
            imgElement.src = DEFAULT_FALLBACK_IMAGE;
            
            const parent = imgElement.parentElement;
            if (parent && !parent.querySelector('.unavailable-tag')) {
                const overlay = document.createElement('div');
                overlay.className = "absolute inset-0 flex items-center justify-center bg-black/50 backdrop-blur-[2px] unavailable-tag";
                overlay.innerHTML = `<span class="bg-black/70 text-zinc-400 text-xs md:text-sm font-medium px-4 py-2 rounded-xl border border-white/5 tracking-wide uppercase">Image indisponible pour le moment</span>`;
                parent.appendChild(overlay);
            }
        }

            mainContent.innerHTML = '';
            
            globalAudioPlayer.src = audioUrl;
            audioPlaybackContainer.classList.remove('hidden');
            
            const isPhoneticHidden = !document.getElementById('togglePhonetic').checked;

            verses.forEach((v) => {
                const textFr = v.translations.find(t => t.resource_id === 31)?.text.replace(/<[^>]*>/g, '') || "Traduction indisponible";
                const textPhonetic = v.translations.find(t => t.resource_id === 57)?.text.replace(/<[^>]*>/g, '') || "Phonétique indisponible";
                
                let hasImageConfigured = globalPublishedImages && globalPublishedImages[v.verse_key] && globalPublishedImages[v.verse_key].trim() !== "";
                let finalImgSrc = hasImageConfigured ? "images/" + globalPublishedImages[v.verse_key] : DEFAULT_FALLBACK_IMAGE;

                let unavailableOverlay = !hasImageConfigured 
                    ? `<div class="absolute inset-0 flex items-center justify-center bg-black/50 backdrop-blur-[2px] unavailable-tag">
                         <span class="bg-black/70 text-zinc-400 text-xs md:text-sm font-medium px-4 py-2 rounded-xl border border-white/5 tracking-wide uppercase">Image indisponible pour le moment</span>
                       </div>` 
                    : '';

                mainContent.innerHTML += `
                    <section id="v-${v.verse_key}" class="glass-card overflow-hidden mb-16 shadow-2xl">
                        <div class="relative h-64 w-full bg-zinc-950 flex items-center justify-center">
                            <img src="${finalImgSrc}" onerror="handleImageError(this)" class="w-full h-full object-cover opacity-40" loading="lazy">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-black/40"></div>
                            
                            ${unavailableOverlay}

                            <div class="absolute top-6 left-6 bg-black/60 px-4 py-1 rounded-full text-xs font-bold text-emerald-400">Verset ${v.verse_key}</div>
                        </div>
                        <div class="p-6 md:p-12 space-y-6 -mt-16 relative z-10 bg-gradient-to-b from-transparent to-[#020617]/95">
                            <p class="quran-arabic text-zinc-100">${v.text_uthmani}</p>
                            
                            <p class="phonetic-text text-sm md:text-base font-medium italic text-teal-300/90 tracking-wide text-left pt-4 border-t border-white/5 ${isPhoneticHidden ? 'hidden' : ''}">
                                ${textPhonetic}
                            </p>
                            
                            <p class="text-zinc-300 font-light italic text-base md:text-lg leading-relaxed text-left pt-2">
                                "${textFr}"
                            </p>
                        </div>
                    </section>
                `;
            });
        }

        function togglePhoneticDisplay() {
            const isChecked = document.getElementById('togglePhonetic').checked;
            const phonetics = document.querySelectorAll('.phonetic-text');
            phonetics.forEach(el => {
                if (isChecked) {
                    el.classList.remove('hidden');
                } else {
                    el.classList.add('hidden');
                }
            });
        }

        async function searchVerse() {
            let userQuery = document.getElementById('searchInput').value.trim();
            if (!userQuery) return;
            
            mainContent.innerHTML = `<div class="py-20 text-emerald-500 animate-pulse text-xl">Recherche globale en cours... (Chargement de toutes les pages d'occurrences)</div>`;
            let normalizedKey = userQuery.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "");

            if (staticSearchIndex[normalizedKey]) {
                let keys = staticSearchIndex[normalizedKey];
                mainContent.innerHTML = `
                    <h2 class="text-2xl font-bold mb-2 text-emerald-500">${keys.length} occurrence(s) au total trouvée(s) pour "${userQuery}"</h2>
                    <p class="text-zinc-400 text-sm mb-8">Affichage complet de tous les versets correspondants :</p>
                `;
                
                keys.forEach(vk => {
                    mainContent.innerHTML += `
                        <div class="glass-card p-6 md:p-8 mb-6 bg-white/5 text-right border-r-4 border-l-0 border-emerald-500 space-y-4">
                            <div class="flex justify-between items-center text-zinc-400 text-xs"><span>Verset ${vk}</span></div>
                            <div id="arabic-pre-${vk.replace(':','-')}" class="quran-container text-right text-xl font-serif text-zinc-100 animate-pulse">Chargement de l'arabe...</div>
                            <p id="text-pre-${vk.replace(':','-')}" class="text-zinc-400 font-light italic text-sm text-left pt-3 border-t border-white/5 animate-pulse">Chargement de la traduction française...</p>
                            <button onclick="goToVerse('${vk}')" class="text-emerald-500 text-xs font-bold pt-2 block hover:underline text-left">LIRE EN IMAGE →</button>
                        </div>`;
                    fetchStaticVerseDetailsAsync(vk);
                });
                return;
            }

            try {
                const isArabic = /[؀-ۿ]/.test(userQuery);
                let langParam = isArabic ? 'ar' : 'fr';
                let safeQuery = encodeURIComponent(userQuery);

                let totalResultsFound = [];
                let currentPage = 1;
                let hasMorePages = true;

                while (hasMorePages && currentPage <= 15) { 
                    let url = `https://api.quran.com/api/v4/search?q=${safeQuery}&page=${currentPage}&size=250&language=${langParam}`;
                    let res = await fetch(url);
                    if (!res.ok) break;
                    
                    let data = await res.json();
                    if (data && data.search && data.search.results && data.search.results.length > 0) {
                        totalResultsFound = totalResultsFound.concat(data.search.results);
                        
                        if (data.search.results.length < 20 && currentPage === 1) {
                            hasMorePages = false;
                        }
                        
                        if (data.search.total_pages && currentPage >= data.search.total_pages) {
                            hasMorePages = false;
                        }
                        
                        currentPage++;
                    } else {
                        hasMorePages = false;
                    }
                }
                
                if (totalResultsFound.length > 0) {
                    mainContent.innerHTML = `
                        <h2 class="text-2xl font-bold mb-2 text-emerald-500">${totalResultsFound.length} occurrence(s) au total trouvée(s) pour "${userQuery}"</h2>
                        <p class="text-zinc-400 text-sm mb-8">Affichage complet de tous les versets correspondants :</p>
                    `;

                    totalResultsFound.forEach(r => {
                        let cleanText = r.text.replace(/<[^>]*>/g, '');
                        let isResultArabic = /[؀-ۿ]/.test(cleanText);
                        
                        let textClass = isResultArabic ? "quran-container text-right text-xl font-serif text-zinc-110" : "text-zinc-200 font-light italic text-sm md:text-base text-left";
                        let cardAlign = isResultArabic ? "text-right border-r-4 border-l-0" : "text-left border-l-4 border-r-0";

                        let translationPlaceholder = isResultArabic 
                            ? `<p id="trans-search-${r.verse_key.replace(':','-')}" class="text-zinc-400 font-light italic text-sm text-left pt-3 border-t border-white/5 animate-pulse">Chargement de la traduction française...</p>` 
                            : '';

                        mainContent.innerHTML += `
                            <div class="glass-card p-6 md:p-8 mb-6 bg-white/5 ${cardAlign} border-emerald-500 space-y-4">
                                <div class="flex justify-between items-center text-zinc-400 text-xs"><span>Verset ${r.verse_key}</span></div>
                                <div class="${textClass}">"${cleanText}"</div>
                                ${translationPlaceholder}
                                <button onclick="goToVerse('${r.verse_key}')" class="text-emerald-500 text-xs font-bold pt-2 block hover:underline text-left">LIRE EN IMAGE →</button>
                            </div>`;
                        
                        if (isResultArabic) {
                            fetchSearchTranslationAsync(r.verse_key);
                        }
                    });
                } else {
                    mainContent.innerHTML = `<p class='py-20 text-zinc-400'>Aucun résultat trouvé pour "${userQuery}".</p>`;
                }
            } catch (e) { 
                console.error(e);
                mainContent.innerHTML = "<p class='py-20 text-red-400'>La recherche a échoué ou l'API rencontre des difficultés de surcharge.</p>"; 
            }
        }

        async function fetchStaticVerseDetailsAsync(vk) {
            try {
                const res = await fetch(`https://api.quran.com/api/v4/verses/by_key/${vk}?language=fr&translations=31&fields=text_uthmani`);
                const data = await res.json();
                if (data && data.verse) {
                    const arabicEl = document.getElementById(`arabic-pre-${vk.replace(':','-')}`);
                    if (arabicEl && data.verse.text_uthmani) {
                        arabicEl.innerText = `"${data.verse.text_uthmani}"`;
                        arabicEl.classList.remove('animate-pulse');
                    }
                    if (data.verse.translations && data.verse.translations[0]) {
                        let textFr = data.verse.translations[0].text.replace(/<[^>]*>/g, '');
                        const transEl = document.getElementById(`text-pre-${vk.replace(':','-')}`);
                        if (transEl) { 
                            transEl.innerText = `Traduction : "${textFr}"`; 
                            transEl.classList.remove('animate-pulse');
                            transEl.classList.replace('text-zinc-400', 'text-zinc-300');
                        }
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function fetchSearchTranslationAsync(vk) {
            try {
                const res = await fetch(`https://api.quran.com/api/v4/verses/by_key/${vk}?language=fr&translations=31`);
                const data = await res.json();
                if (data && data.verse && data.verse.translations) {
                    let text = data.verse.translations[0].text.replace(/<[^>]*>/g, '');
                    const el = document.getElementById(`trans-search-${vk.replace(':','-')}`);
                    if (el) { 
                        el.innerText = `Traduction : "${text}"`; 
                        el.classList.remove('animate-pulse'); 
                        el.classList.replace('text-zinc-400', 'text-zinc-300');
                    }
                }
            } catch (e) {}
        }

        async function goToVerse(vk) {
            surahSelect.value = vk.split(':')[0];
            handleSurahChange();
            await loadSurah();
            setTimeout(() => {
                const el = document.getElementById(`v-${vk}`);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                verseSelect.value = vk.split(':')[1];
            }, 800);
        }

        window.onload = init;
    </script>
</body>
</html>
