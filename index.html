<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranVision</title>
    
    <link rel="manifest" href="manifest.json?v=8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/jpeg" href="logo0.jpg">
    <link rel="icon" type="image/jpeg" sizes="192x192" href="logo0.jpg">
    <link rel="apple-touch-icon" href="logo0.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Bloque le défilement global de la page entière */
        html, body { 
            background: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            height: 100vh;
            overflow: hidden; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }
        
        /* Configuration de la navigation fixe en haut */
        nav {
            flex-shrink: 0;
            z-index: 50;
        }

        /* PERMET LE DÉFILEMENT UNIQUEMENT ICI (Zone des versets) */
        main {
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Défilement fluide sur iOS */
            padding-bottom: 90px !important; /* Laisse de l'espace pour ne pas cacher le dernier verset derrière l'audio */
        }

        .quran-container { direction: rtl; text-align: right; }
        .quran-arabic { 
            font-family: 'Amiri', serif !important; 
            font-size: 1.6rem !important; 
            line-height: 2.3 !important; 
            display: inline-block;
            width: 100%;
            text-align: center;
            word-spacing: 2px;
        }
        @media (min-width: 768px) {
            .quran-arabic { font-size: 2.4rem !important; line-height: 2.5 !important; word-spacing: 4px; }
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2.5rem;
        }
        .audio-player-container {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            max-w: 550px;
            margin: 0 auto;
            padding: 8px 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        audio { height: 40px; width: 100%; outline: none; }
        
        .phonetic-text.hidden { display: none !important; }

        /* Fixe la barre audio en bas de l'écran sans bouger */
        .bottom-audio-bar {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            z-index: 40;
            background: rgba(2, 6, 23, 0.95) !important;
            backdrop-filter: blur(16px) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px !important;
        }
    </style>
</head>
<body class="relative">

    <nav class="p-4 bg-black/70 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
            
            <div class="flex items-center justify-between w-full lg:w-auto gap-4">
                <h1 onclick="window.location.reload()" class="cursor-pointer text-2xl font-bold tracking-tighter text-emerald-500 flex items-center gap-2">
                    <span class="bg-emerald-500 text-black px-2 py-1 rounded-lg text-sm italic font-black">IQRA</span> QURAN<span class="text-white font-light">VISION</span>
                </h1>
                <div class="flex items-center gap-1.5 bg-zinc-900/80 border border-zinc-800 px-3 py-1 rounded-full text-xs font-medium text-zinc-400">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span id="liveCounter">1</span> en ligne
                </div>
            </div>
            
            <div class="w-full lg:w-auto grid grid-cols-2 md:flex md:flex-wrap items-center gap-2.5">
                
                <div class="col-span-2 flex items-center gap-1.5 w-full md:w-auto">
                    <input type="text" id="searchInput" placeholder="Recherche / بحث..." class="w-full md:w-48 px-3.5 py-2 rounded-xl text-xs text-white bg-black/40 border border-white/10 focus:border-emerald-500 focus:outline-none">
                    <button onclick="searchVerse()" class="bg-zinc-800 hover:bg-zinc-700 text-emerald-400 p-2 rounded-xl border border-white/10 transition-all flex items-center justify-center shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5" stroke-linecap="round"></path>
                        </svg>
                    </button>
                </div>

                <div class="flex items-center gap-2 bg-zinc-900/90 border border-zinc-700 px-3 py-2 rounded-xl text-xs font-medium text-zinc-300 justify-center">
                    <input type="checkbox" id="togglePhonetic" checked onchange="togglePhoneticDisplay()" class="w-3.5 h-3.5 accent-emerald-500 cursor-pointer">
                    <label for="togglePhonetic" class="cursor-pointer select-none">Phonétique</label>
                </div>

                <select id="surahSelect" onchange="handleSurahChange()" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs outline-none text-white w-full md:w-36"></select>
                
                <select id="verseSelect" onchange="scrollToSelectedVerse()" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs outline-none text-white w-full md:w-20">
                    <option value="">Verset</option>
                </select>

                <select id="reciterSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs outline-none text-white w-full md:w-36">
                    <option value="7">Mishary Alafasy</option>
                    <option value="3">Abdur-Rahman as-Sudais</option>
                    <option value="128">Yasser Ad-Dussary</option>
                </select>

                <button onclick="loadSurah()" class="col-span-2 md:col-span-1 bg-emerald-600 hover:bg-emerald-400 text-black font-bold px-5 py-2 rounded-xl text-xs transition-all w-full md:w-auto uppercase tracking-wider">Explorer</button>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-4xl mx-auto p-4 md:p-8 w-full space-y-12 text-center">
        <div id="welcome-screen" class="py-24 space-y-8">
            <div class="inline-block p-6 rounded-full bg-emerald-500/10 animate-pulse">
                <svg class="w-16 h-16 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5s3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <h2 class="text-4xl md:text-6xl font-bold tracking-tight">Bienvenue sur QuranVision</h2>
            <p id="loading-status" class="text-zinc-400 text-lg max-w-lg mx-auto font-light">Recherchez un terme du Quran ou choisissez une Sourate.</p>
        </div>
    </main>

    <div id="audio-bar-container"></div>

    <script>
        // Implémentation de la fonction de rendu modifiée pour cibler le bas de l'écran
        function renderSurah(verses, audio) {
            // On met les commandes audio fixes dans le conteneur du bas
            document.getElementById('audio-bar-container').innerHTML = `
                <div class="bottom-audio-bar flex justify-center items-center gap-2">
                    <button onclick="changeSurah(-1)" class="bg-zinc-900/90 hover:bg-zinc-800 text-emerald-400 p-3 rounded-full border border-white/10 transition-all shadow-xl" title="Sourate précédente">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path>
                        </svg>
                    </button>
                    
                    <div class="audio-player-container flex-1">
                        <audio src="${audio}" controls></audio>
                    </div>
                    
                    <button onclick="changeSurah(1)" class="bg-zinc-900/90 hover:bg-zinc-800 text-emerald-400 p-3 rounded-full border border-white/10 transition-all shadow-xl" title="Sourate suivante">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </button>
                </div>`;
            
            // On nettoie et prépare la zone des versets
            mainContent.innerHTML = '';
            const isPhoneticHidden = !document.getElementById('togglePhonetic').checked;

            verses.forEach((v) => {
                const textFr = v.translations.find(t => t.resource_id === 31)?.text.replace(/<[^>]*>/g, '') || "Traduction indisponible";
                const textPhonetic = v.translations.find(t => t.resource_id === 57)?.text.replace(/<[^>]*>/g, '') || "Phonétique indisponible";
                
                let hasImageConfigured = globalPublishedImages && globalPublishedImages[v.verse_key] && globalPublishedImages[v.verse_key].trim() !== "";
                let finalImgSrc = hasImageConfigured ? "images/" + globalPublishedImages[v.verse_key] : DEFAULT_FALLBACK_IMAGE;

                let unavailableOverlay = !hasImageConfigured 
                    ? `<div class="absolute inset-0 flex items-center justify-center bg-black/50 backdrop-blur-[2px] unavailable-tag">
                         <span class="bg-black/70 text-zinc-400 text-xs md:text-sm font-medium px-4 py-2 rounded-xl border border-white/5 tracking-wide uppercase">Image indisponible pour le moment</span>
                       </div>` 
                    : '';

                mainContent.innerHTML += `
                    <section id="v-${v.verse_key}" class="glass-card overflow-hidden mb-16 shadow-2xl">
                        <div class="relative h-64 w-full bg-zinc-950 flex items-center justify-center">
                            <img src="${finalImgSrc}" onerror="handleImageError(this)" class="w-full h-full object-cover opacity-40" loading="lazy">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-black/40"></div>
                            ${unavailableOverlay}
                            <div class="absolute top-6 left-6 bg-black/60 px-4 py-1 rounded-full text-xs font-bold text-emerald-400">Verset ${v.verse_key}</div>
                        </div>
                        <div class="p-6 md:p-12 space-y-6 -mt-16 relative z-10 bg-gradient-to-b from-transparent to-[#020617]/95">
                            <p class="quran-arabic text-zinc-100">${v.text_uthmani}</p>
                            <p class="phonetic-text text-sm md:text-base font-medium italic text-teal-300/90 tracking-wide text-left pt-4 border-t border-white/5 ${isPhoneticHidden ? 'hidden' : ''}">
                                ${textPhonetic}
                            </p>
                            <p class="text-zinc-300 font-light italic text-base md:text-lg leading-relaxed text-left pt-2">
                                "${textFr}"
                            </p>
                        </div>
                    </section>
                `;
            });
            
            // Remonte le scroll de la zone principale au début lors du changement de sourate
            mainContent.scrollTop = 0;
        }

        // Modifie également la fonction de défilement vers un verset précis pour qu'elle cible la zone <main>
        async function scrollToSelectedVerse() {
            const verseId = verseSelect.value;
            const surahId = surahSelect.value;
            if (!verseId || !surahId) return;

            let targetElement = document.getElementById(`v-${surahId}:${verseId}`);
            
            if (!targetElement) {
                await loadSurah();
                setTimeout(() => {
                    targetElement = document.getElementById(`v-${surahId}:${verseId}`);
                    if (targetElement) targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 800);
            } else {
                targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    </script>
</body>
</html>
