<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranVision - Immersion Spirituelle</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        .quran-container {
            direction: rtl;
            text-align: right;
        }
        /* Style pour intégrer les polices et couleurs Tajweed natives de l'API Quran.com */
        .quran-arabic { 
            font-family: 'Amiri', serif; 
            font-size: 2.8rem; 
            line-height: 2.2; 
            display: inline-block;
            letter-spacing: 0px;
        }
        
        /* Classes de couleurs globales utilisées par l'API V4 de Quran.com pour le Tajweed */
        .quran-arabic [class*="tajweed"], .quran-arabic span[style*="color"] {
            display: inline !important;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.01); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06); 
            border-radius: 2.5rem;
            transition: all 0.3s ease;
        }
        .glass-card:hover { 
            border-color: rgba(16, 185, 129, 0.3); 
        }

        .audio-player-container {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            max-w: 450px;
            margin: 0 auto;
            padding: 8px 16px;
        }
        audio { height: 40px; width: 100%; }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="sticky top-0 z-50 p-4 bg-black/60 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
            <h1 onclick="window.location.reload()" class="cursor-pointer text-2xl font-bold text-emerald-500 flex items-center gap-2">
                <span class="bg-emerald-500 text-black px-2 py-1 rounded-lg text-sm font-black">IQRA</span> QURAN<span class="text-white font-light">VISION</span>
            </h1>
            
            <div class="flex flex-wrap justify-center items-center gap-3">
                <select id="surahSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs text-white w-40"></select>
                <select id="reciterSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs text-white">
                    <option value="7">Mishary Alafasy</option>
                    <option value="3">Abdur-Rahman as-Sudais</option>
                    <option value="128">Yasser Ad-Dussary</option>
                </select>
                <button onclick="loadSurah()" class="bg-emerald-600 hover:bg-emerald-500 text-black font-bold px-6 py-2 rounded-xl text-xs transition-all">Explorer</button>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-4xl mx-auto p-4 md:p-8 mt-6 space-y-12 text-center">
        <div id="welcome-screen" class="py-24 space-y-4">
            <h2 class="text-3xl md:text-5xl font-bold text-emerald-500">Mushaf Tajweed Interactif</h2>
            <p class="text-zinc-400 text-sm">Sélectionnez une sourate pour afficher le texte arabe coloré sans aucun bug.</p>
        </div>
    </main>

    <script>
        const mainContent = document.getElementById('main-content');
        const surahSelect = document.getElementById('surahSelect');

        // Initialisation des sourates
        async function init() {
            try {
                const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
                const data = await res.json();
                data.chapters.forEach(s => {
                    surahSelect.innerHTML += `<option value="${s.id}">${s.id}. ${s.name_simple}</option>`;
                });
            } catch (e) { console.error(e); }
        }

        // Chargement unifié depuis une seule et unique API (Quran.com V4)
        async function loadSurah() {
            const sid = surahSelect.value;
            const rid = document.getElementById('reciterSelect').value;
            mainContent.innerHTML = `<div class="py-20 text-emerald-500 animate-pulse text-lg">Chargement du Mushaf Tajweed...</div>`;
            
            try {
                // On demande le format 'text_tajweed' officiel de Quran.com qui contient du HTML propre (sans crochets !)
                const [versesRes, audioRes] = await Promise.all([
                    fetch(`https://api.quran.com/api/v4/verses/by_chapter/${sid}?language=fr&words=false&translations=31&fields=text_tajweed&per_page=300`),
                    fetch(`https://api.quran.com/api/v4/chapter_recitations/${rid}/${sid}`)
                ]);
                
                const versesData = await versesRes.json();
                const audioData = await audioRes.json();
                
                renderSurah(versesData.verses, audioData.audio_file.audio_url);
            } catch (e) { 
                console.error(e);
                mainContent.innerHTML = "<div class='py-20 text-red-400'>Erreur de connexion aux serveurs. Réessayez.</div>"; 
            }
        }

        function renderSurah(verses, audioUrl) {
            mainContent.innerHTML = `
                <div class="sticky top-24 z-40 w-full mb-12 px-4">
                    <div class="audio-player-container shadow-2xl">
                        <audio src="${audioUrl}" controls></audio>
                    </div>
                </div>`;

            verses.forEach((v) => {
                const textFr = v.translations[0].text.replace(/<[^>]*>/g, '');
                
                // Sécurité : Si le format Tajweed officiel n'est pas chargé, on applique un filtre de nettoyage strict
                let textAr = v.text_tajweed || "";
                
                // On supprime définitivement tous les résidus de crochets s'il y en a
                textAr = textAr.replace(/[\[\]]/g, '');

                mainContent.innerHTML += `
                    <section class="glass-card p-8 md:p-12 mb-8 bg-white/[0.02] text-center space-y-6">
                        <div class="text-left text-xs font-bold text-emerald-500/70 tracking-wider">VERSET ${v.verse_key}</div>
                        
                        <div class="quran-container my-6">
                            <p class="quran-arabic text-zinc-100" dir="rtl">${textAr}</p>
                        </div>
                        
                        <div class="h-px浏览 w-16 bg-emerald-500/20 mx-auto"></div>
                        
                        <p class="text-zinc-300 text-lg md:text-xl font-light italic">"${textFr}"</p>
                    </section>`;
            });
        }

        init();
    </script>
</body>
</html>
