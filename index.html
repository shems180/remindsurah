<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranVision - Mushaf Tajweed</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --emerald: #10b981; }
        body { 
            background: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        .quran-container { direction: rtl; text-align: right; }
        .quran-arabic { 
            font-family: 'Amiri', serif; 
            font-size: 2.8rem; 
            line-height: 2.6; 
            display: inline-block;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* --- STYLISATION DOULOUREUSEMENT CORRIGÉE POUR LE TAJWEED --- */
        .quran-arabic span, .quran-arabic font {
            display: inline !important;
            font-family: inherit !important;
        }
        
        /* Code Couleur Officiel du Mushaf Tajweed Majeed */
        .tajweed-madd, .tajweed-ghunnah, [style*="color:#FF0000"], [style*="color:red"], [style*="color: #ff"] { 
            color: #ff4444 !important; 
            font-weight: 700 !important; 
        }
        .tajweed-ikhfa, .tajweed-idgham, [style*="color:#00A859"], [style*="color:green"], [style*="color: #00"] { 
            color: #10b981 !important; 
            font-weight: 700 !important; 
        }
        .tajweed-qalqalah, [style*="color:#00AEEF"], [style*="color:blue"], [style*="color: #21"] { 
            color: #3b82f6 !important; 
            font-weight: 700 !important; 
        }
        .tajweed-silent, [style*="color:#939598"], [style*="color:gray"], [style*="opacity"] { 
            color: #6b7280 !important; 
            opacity: 0.5 !important; 
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2.5rem;
        }
        .search-input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
        .search-input:focus { border-color: var(--emerald); outline: none; }
        audio { border-radius: 50px; width: 100%; }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="sticky top-0 z-50 p-4 bg-black/60 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
            <h1 onclick="window.location.reload()" class="cursor-pointer text-2xl font-bold tracking-tighter text-emerald-500 flex items-center gap-2">
                <span class="bg-emerald-500 text-black px-2 py-1 rounded-lg text-sm italic font-black">IQRA</span> QURAN<span class="text-white font-light">VISION</span>
            </h1>
            
            <div class="flex flex-wrap justify-center items-center gap-3">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Recherche par mot (fr)..." class="search-input w-56 md:w-64 px-4 py-2 rounded-xl text-sm text-white">
                    <button onclick="searchVerse()" class="absolute right-3 top-2 text-emerald-400 hover:text-white transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" stroke-linecap="round"></path></svg>
                    </button>
                </div>
                <select id="surahSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs outline-none w-32 md:w-40"></select>
                <select id="reciterSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs outline-none">
                    <option value="7">Mishary Alafasy</option>
                    <option value="3">Abdur-Rahman as-Sudais</option>
                </select>
                <button onclick="loadSurah()" class="bg-emerald-600 hover:bg-emerald-400 text-black font-bold px-6 py-2 rounded-xl transition-all">Explorer</button>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-4xl mx-auto p-4 md:p-8 mt-6 space-y-12 text-center">
        <div id="welcome-screen" class="py-24 space-y-8">
            <h2 class="text-4xl md:text-6xl font-bold tracking-tight">Le Mushaf Tajweed Authentique.</h2>
            <p class="text-zinc-400 text-lg max-w-lg mx-auto font-light leading-relaxed">Règles de récitation colorées vérifiées • Sans coupure</p>
        </div>
    </main>

    <script>
        const mainContent = document.getElementById('main-content');
        const surahSelect = document.getElementById('surahSelect');

        async function init() {
            try {
                const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
                const data = await res.json();
                data.chapters.forEach(s => {
                    surahSelect.innerHTML += `<option value="${s.id}">${s.id}. ${s.name_simple}</option>`;
                });
            } catch (e) { console.error(e); }
        }

        // Moteur de rendu hybride combinant le flux texte stable et l'injecteur Tajweed coloré révisé
        async function loadSurah() {
            const sid = surahSelect.value;
            const rid = document.getElementById('reciterSelect').value;
            mainContent.innerHTML = `<div class="py-20 text-emerald-500 animate-pulse text-xl font-bold uppercase">Génération du Mushaf Tajweed...</div>`;
            
            try {
                // Requête combinée : Traduction française officielle + Code source Tajweed brut de secours
                const [vRes, tRes, aRes] = await Promise.all([
                    fetch(`https://api.quran.com/api/v4/verses/by_chapter/${sid}?language=fr&translations=31&per_page=300`),
                    fetch(`https://api.quran.com/api/v3/chapters/${sid}/verses?recitation=1&wp=v2`), // Route v3 contenant les balises injectées stables
                    fetch(`https://api.quran.com/api/v4/chapter_recitations/${rid}/${sid}`)
                ]);

                const vData = await vRes.json();
                const tData = await tRes.json();
                const aData = await aRes.json();

                renderSurah(vData.verses, tData.verses, aData.audio_file.audio_url);
            } catch (e) { 
                console.error(e);
                mainContent.innerHTML = "<p class='py-20 text-red-400'>Erreur de chargement des données de récitation.</p>"; 
            }
        }

        function renderSurah(versesFr, versesTajweed, audioUrl) {
            mainContent.innerHTML = `
                <div class="glass-card p-6 sticky top-24 z-40 bg-black/80 shadow-2xl mb-12">
                    <audio src="${audioUrl}" controls class="h-10"></audio>
                </div>`;

            versesFr.forEach((v, i) => {
                const textFr = v.translations[0].text.replace(/<[^>]*>/g, '');
                
                // Récupération et parsing forcé du code Tajweed coloré depuis la base v3 stable
                let textArDisplay = "";
                if(versesTajweed[i] && versesTajweed[i].text_tajweed) {
                    textArDisplay = versesTajweed[i].text_tajweed;
                } else {
                    textArDisplay = v.text_uthmani;
                }

                mainContent.innerHTML += `
                    <section id="v-${v.verse_key}" class="glass-card overflow-hidden mb-16 p-8 md:p-14 space-y-10">
                        <div class="text-left bg-black/40 inline-block px-4 py-1 rounded-full text-[10px] font-bold border border-white/5 uppercase">Verset ${v.verse_number}</div>
                        <div class="quran-container">
                            <p class="quran-arabic text-zinc-100" dir="rtl">${textArDisplay}</p>
                        </div>
                        <div class="h-px w-20 bg-emerald-500/30 mx-auto"></div>
                        <p class="text-zinc-300 text-xl md:text-2xl font-light italic leading-relaxed">"${textFr}"</p>
                    </section>`;
            });
        }

        async function searchVerse() {
            let query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            
            mainContent.innerHTML = `<div class="py-20 text-emerald-500 animate-pulse text-xl">Recherche dans le dictionnaire...</div>`;

            try {
                const res = await fetch(`https://api.quran.com/api/v4/search?q=${encodeURIComponent(query)}&size=10&language=fr`);
                const data = await res.json();
                
                if (data.search && data.search.results && data.search.results.length > 0) {
                    let buffer = `<h2 class="text-2xl font-bold mb-8 text-emerald-500">${data.search.results.length} occurrences trouvées</h2>`;
                    
                    for (const item of data.search.results) {
                        const surahId = item.verse_key.split(':')[0];
                        const tRes = await fetch(`https://api.quran.com/api/v3/chapters/${surahId}/verses?recitation=1&wp=v2`);
                        const tData = await tRes.json();
                        
                        const targetVerse = tData.verses.find(v => v.verse_key === item.verse_key);
                        const cleanFr = item.text.replace(/<[^>]*>/g, '');
                        const arText = targetVerse ? targetVerse.text_tajweed : item.words.map(w => w.text).join(' ');

                        buffer += `
                            <div class="glass-card p-6 mb-6 text-center space-y-6 border-l-4 border-emerald-500">
                                <p class="text-zinc-400 text-xs text-left uppercase font-bold tracking-wider">Verset ${item.verse_key}</p>
                                <div class="quran-container">
                                    <p class="quran-arabic text-zinc-100" dir="rtl">${arText}</p>
                                </div>
                                <div class="h-px w-12 bg-emerald-500/20 mx-auto"></div>
                                <p class="text-left italic text-zinc-200 text-base leading-relaxed" dir="ltr">"${cleanFr}"</p>
                            </div>`;
                    }
                    mainContent.innerHTML = buffer;
                } else {
                    mainContent.innerHTML = "<p class='py-20 text-zinc-400'>Aucun résultat trouvé.</p>";
                }
            } catch (e) { 
                mainContent.innerHTML = "<p class='py-20 text-red-400'>Erreur lors du traitement de la requête.</p>"; 
            }
        }

        init();
    </script>
</body>
</html>
