<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranVision</title>
    
    <link rel="manifest" href="manifest.json?v=10">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link class="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        .quran-container { 
            direction: rtl; 
            text-align: right; 
        }
        .quran-arabic { 
            font-family: 'Amiri', serif !important; 
            font-size: 1.6rem !important; 
            line-height: 2.3 !important; 
            display: inline-block;
            width: 100%;
            text-align: center;
            word-spacing: 2px;
        }
        @media (min-width: 768px) {
            .quran-arabic { 
                font-size: 2.4rem !important; 
                line-height: 2.5 !important; 
                word-spacing: 4px; 
            }
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2.5rem;
        }
        .audio-player-container {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            max-w: 450px;
            margin: 0 auto;
            padding: 8px 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        audio { 
            height: 40px; 
            width: 100%; 
            outline: none; 
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="sticky top-0 z-50 p-4 bg-black/70 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
            
            <div class="flex flex-wrap items-center justify-center gap-4">
                <h1 onclick="window.location.reload()" class="cursor-pointer text-2xl font-bold tracking-tighter text-emerald-500 flex items-center gap-2">
                    <span class="bg-emerald-500 text-black px-2 py-1 rounded-lg text-sm italic font-black">IQRA</span> QURAN<span class="text-white font-light">VISION</span>
                </h1>
                <button onclick="checkAdminPassword()" id="adminBadge" class="text-[10px] bg-red-600 text-white font-bold px-2 py-0.5 rounded transition hover:bg-red-700">⚡ Déconnexion Admin</button>
                <button onclick="exportConfig()" id="exportBtn" class="text-[10px] bg-emerald-900/50 text-emerald-400 px-2 py-0.5 rounded border border-emerald-700/50 hover:bg-emerald-500 hover:text-black transition inline-block">📦 Télécharger le HTML mis à jour</button>
            </div>
            
            <div class="flex flex-wrap justify-center items-center gap-3">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Recherche (ex: Moise, Paradis)..." class="w-56 md:w-64 px-4 py-2 rounded-xl text-sm text-white bg-black/40 border border-white/10 focus:border-emerald-500 focus:outline-none">
                    <button onclick="searchVerse()" class="absolute right-3 top-2 text-emerald-400 hover:text-white transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" stroke-linecap="round"></path>
                        </svg>
                    </button>
                </div>
                
                <select id="surahSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs outline-none w-32 md:w-40 text-white">
                    <option value="1">1. Al-Fatihah</option>
                    <option value="2">2. Al-Baqarah</option>
                    <option value="3">3. Ali 'Imran</option>
                    <option value="4">4. An-Nisa</option>
                    <option value="5">5. Al-Ma'idah</option>
                    <option value="114">114. An-Nas</option>
                </select>

                <select id="reciterSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs outline-none text-white">
                    <option value="7">Mishary Alafasy</option>
                    <option value="3">Abdur-Rahman as-Sudais</option>
                    <option value="128">Yasser Ad-Dussary</option>
                </select>
                
                <button onclick="loadSurah()" class="bg-emerald-600 hover:bg-emerald-400 text-black font-bold px-6 py-2 rounded-xl transition-all">Explorer</button>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-4xl mx-auto p-4 md:p-8 mt-6 space-y-12 text-center">
        
        <div class="sticky top-24 z-40 w-full mb-12 px-4">
            <div class="audio-player-container">
                <audio src="https://download.quranicaudio.com/qdc/mishari_al_afasy/murattal/1.mp3" controls></audio>
            </div>
        </div>

                <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-black/40"></div>
            </div>
            
            <div class="p-6 md:p-8 bg-zinc-900/50">
                <div class="quran-container mb-6">
                    <span class="quran-arabic text-emerald-300">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</span>

            </div>

    </main>

</body>
</html>
