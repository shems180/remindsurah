<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranVision - Immersion Personnalisée</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link class="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        .quran-container {
            direction: rtl;
            text-align: right;
        }
        .quran-arabic { 
            font-family: 'Amiri', serif; 
            font-size: 3rem; 
            line-height: 2.5; 
            display: inline-block;
            width: 100%;
            text-align: center;
            word-spacing: 4px;
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2.5rem;
        }
        .audio-player-container {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            max-w: 450px;
            margin: 0 auto;
            padding: 8px 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        audio { height: 40px; width: 100%; outline: none; }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="sticky top-0 z-50 p-4 bg-black/70 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
            <h1 onclick="window.location.reload()" class="cursor-pointer text-2xl font-bold tracking-tighter text-emerald-500 flex items-center gap-2">
                <span class="bg-emerald-500 text-black px-2 py-1 rounded-lg text-sm italic font-black">IQRA</span> QURAN<span class="text-white font-light">VISION</span>
            </h1>
            
            <div class="flex flex-wrap justify-center items-center gap-3">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Recherche (ex: Moise, Ciel)..." class="w-56 md:w-64 px-4 py-2 rounded-xl text-sm text-white bg-black/40 border border-white/10 focus:border-emerald-500 focus:outline-none">
                    <button onclick="searchVerse()" class="absolute right-3 top-2 text-emerald-400 hover:text-white transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" stroke-linecap="round"></path></svg>
                    </button>
                </div>
                <select id="surahSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs outline-none w-32 md:w-40 text-white"></select>
                <select id="reciterSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs outline-none text-white">
                    <option value="7">Mishary Alafasy</option>
                    <option value="3">Abdur-Rahman as-Sudais</option>
                    <option value="128">Yasser Ad-Dussary</option>
                </select>
                <button onclick="loadSurah()" class="bg-emerald-600 hover:bg-emerald-400 text-black font-bold px-6 py-2 rounded-xl transition-all shadow-lg shadow-emerald-900/20">Explorer</button>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-4xl mx-auto p-4 md:p-8 mt-6 space-y-12 text-center">
        <div id="welcome-screen" class="py-24 space-y-8">
            <div class="inline-block p-6 rounded-full bg-emerald-500/10 animate-pulse">
                <svg class="w-16 h-16 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5s3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <h2 class="text-4xl md:text-6xl font-bold tracking-tight">Votre Éditeur de Signes.</h2>
            <p class="text-zinc-400 text-lg max-w-lg mx-auto font-light leading-relaxed">Importez vos propres photos de galerie verset par verset</p>
        </div>
    </main>

    <script>
        const mainContent = document.getElementById('main-content');
        const surahSelect = document.getElementById('surahSelect');

        // Banque par défaut automatique (si aucune image personnalisée n'est enregistrée)
        const imageBank = {
            univers: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1200&q=80",
            balance: "https://images.unsplash.com/photo-1590523177345-420379ee050d?auto=format&fit=crop&w=1200&q=80", 
            prairie: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1200&q=80", 
            feu: "https://images.unsplash.com/photo-1524813686514-a57563d77d61?auto=format&fit=crop&w=1200&q=80",
            sablier: "https://images.unsplash.com/photo-1611244419377-b0a760c19719?auto=format&fit=crop&w=1200&q=80",
            coran: "https://images.unsplash.com/photo-1609599006353-e629f1d29718?auto=format&fit=crop&w=1200&q=80",
            muhammed: "https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1200&q=80", 
            colombe: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80", 
            coeur: "https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=1200&q=80", 
            parents: "https://images.unsplash.com/photo-1494959764136-6be9eb3c261e?auto=format&fit=crop&w=1200&q=80", 
            allah: "https://images.unsplash.com/photo-1564507592333-c60657eea523?auto=format&fit=crop&w=1200&q=80", 
            idole: "https://images.unsplash.com/photo-1599733589046-10c005739ef9?auto=format&fit=crop&w=1200&q=80", 
            bateau: "https://images.unsplash.com/photo-1516690561799-46d8f74f9abf?auto=format&fit=crop&w=1200&q=80", 
            pyramide: "https://images.unsplash.com/photo-1539650116574-8efeb43e2750?auto=format&fit=crop&w=1200&q=80",
            adam: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80", 
            mouton: "https://images.unsplash.com/photo-1484557985045-edf25e08da73?auto=format&fit=crop&w=1200&q=80", 
            ibrahim: "https://images.unsplash.com/photo-1591604121669-f14d8bc079e2?auto=format&fit=crop&w=1200&q=80", 
            kaaba: "https://images.unsplash.com/photo-1591604121669-f14d8bc079e2?auto=format&fit=crop&w=1200&q=80",
            ciel: "https://images.unsplash.com/photo-1513002749550-c59d786b8e6c?auto=format&fit=crop&w=1200&q=80",
            montagne: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80",
            mer: "https://images.unsplash.com/photo-1505118380757-91f5f5632de0?auto=format&fit=crop&w=1200&q=80",
            defaut: "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=1200&q=80"
        };

        function getThemeImage(textFr, verseKey) {
            // ÉTAPE 1 : Vérifier si l'utilisateur a enregistré une image personnalisée pour ce verset
            const localImg = localStorage.getItem(`custom-img-${verseKey}`);
            if (localImg) return localImg;

            // ÉTAPE 2 : Sinon, utiliser la banque par défaut
            if (!textFr) return imageBank.defaut;
            const clean = textFr.toLowerCase();

            if (clean.includes('univers')) return imageBank.univers;
            if (clean.match(/(rétribution|comptes|dernier)/)) return imageBank.balance;
            if (clean.match(/(paradis|récompense)/)) return imageBank.prairie;
            if (clean.match(/(enfer|géhenne|châtiment|feu)/)) return imageBank.feu;
            if (clean.includes('temps')) return imageBank.sablier;
            if (clean.match(/(livre|coran)/)) return imageBank.coran;
            if (clean.match(/(prophète muhammed|muhammad)/)) return imageBank.muhammed;
            if (clean.includes('paix')) return imageBank.colombe;
            if (clean.includes('amour')) return imageBank.coeur;
            if (clean.includes('parents')) return imageBank.parents;
            if (clean.match(/(allah|seigneur)/)) return imageBank.allah;
            if (clean.match(/(idole|associé)/)) return imageBank.idole;
            if (clean.includes('nuh')) return imageBank.bateau;
            if (clean.includes('moussa')) return imageBank.pyramide;
            if (clean.includes('adam')) return imageBank.adam;
            if (clean.includes('ismail')) return imageBank.mouton;
            if (clean.includes('ibrahim')) return imageBank.ibrahim;
            if (clean.match(/(maison sacrée|kaaba)/)) return imageBank.kaaba;
            if (clean.includes('ciel')) return imageBank.ciel;
            if (clean.includes('montagne')) return imageBank.montagne;
            if (clean.includes('mer')) return imageBank.mer;

            return imageBank.defaut;
        }

        // FONCTION DE SAUVEGARDE DE TON IMAGE PERSO
        function handleImageUpload(event, verseKey) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                // Enregistre l'image localement pour cette clé de verset
                localStorage.setItem(`custom-img-${verseKey}`, base64Image);
                // Met à jour le visuel immédiatement sur l'écran
                const imgElement = document.getElementById(`img-view-${verseKey}`);
                if (imgElement) imgElement.src = base64Image;
            };
            reader.readAsDataURL(file);
        }

        async function init() {
            try {
                const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
                const data = await res.json();
                surahSelect.innerHTML = '';
                data.chapters.forEach(s => {
                    surahSelect.innerHTML += `<option value="${s.id}">${s.id}. ${s.name_simple}</option>`;
                });
            } catch (e) { console.error(e); }
        }

        function isArabic(text) { return /[\u0600-\u06FF]/.test(text); }

        async function searchVerse() {
            let query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            mainContent.innerHTML = `<div class="py-20 text-emerald-500 animate-pulse text-xl">Recherche en cours...</div>`;
            try {
                const res = await fetch(`https://api.quran.com/api/v4/search?q=${encodeURIComponent(query)}&size=20&language=${isArabic(query) ? 'ar' : 'fr'}`);
                const data = await res.json();
                if (data.search && data.search.results && data.search.results.length > 0) {
                    renderSearchResults(data.search.results, isArabic(query));
                } else {
                    mainContent.innerHTML = "<p class='py-20 text-zinc-400'>Aucun résultat trouvé.</p>";
                }
            } catch (e) { mainContent.innerHTML = "<p class='py-20 text-red-400'>Erreur réseau.</p>"; }
        }

        function renderSearchResults(results, isAr) {
            mainContent.innerHTML = `<h2 class="text-2xl font-bold mb-8 text-emerald-500">${results.length} résultats correspondants</h2>`;
            results.forEach(r => {
                mainContent.innerHTML += `
                    <div class="glass-card p-6 mb-4 bg-white/5 border-l-4 border-emerald-500 text-left">
                        <p class="text-zinc-400 text-xs mb-2">Verset ${r.verse_key}</p>
                        <p class="text-zinc-200 ${isAr ? 'text-right font-serif text-2xl' : 'italic text-base'}">${r.text.replace(/<[^>]*>/g, '')}</p>
                        <button onclick="goToVerse('${r.verse_key}')" class="text-emerald-500 text-xs font-bold mt-4 block hover:underline">OUVRIR LA SOURATE →</button>
                    </div>`;
            });
        }

        async function goToVerse(vk) {
            surahSelect.value = vk.split(':')[0];
            await loadSurah();
            setTimeout(() => {
                const el = document.getElementById(`v-${vk}`);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 600);
        }

        async function loadSurah() {
            const sid = surahSelect.value;
            const rid = document.getElementById('reciterSelect').value;
            mainContent.innerHTML = `<div class="py-20 text-emerald-500 animate-bounce text-xl font-bold">CHARGEMENT...</div>`;
            
            try {
                const res = await fetch(`https://api.quran.com/api/v4/verses/by_chapter/${sid}?language=fr&translations=31&fields=text_uthmani&per_page=300`);
                const data = await res.json();
                
                const audioRes = await fetch(`https://api.quran.com/api/v4/chapter_recitations/${rid}/${sid}`);
                const audioData = await audioRes.json();
                
                renderSurah(data.verses, audioData.audio_file.audio_url);
            } catch (e) { 
                console.error(e);
                mainContent.innerHTML = "<div class='py-20 text-red-400'>Erreur de chargement. Veuillez réessayer.</div>"; 
            }
        }

        function renderSurah(verses, audio) {
            mainContent.innerHTML = `
                <div class="sticky top-24 z-40 w-full mb-12 px-4">
                    <div class="audio-player-container"><audio src="${audio}" controls></audio></div>
                </div>`;

            verses.forEach((v) => {
                const textFr = v.translations[0].text.replace(/<[^>]*>/g, '');
                const dynamicImg = getThemeImage(textFr, v.verse_key);
                const verseHtml = v.text_uthmani;

                mainContent.innerHTML += `
                    <section id="v-${v.verse_key}" class="glass-card overflow-hidden mb-16 shadow-2xl">
                        <div class="relative h-64 w-full bg-zinc-950 flex items-center justify-center">
                            <img id="img-view-${v.verse_key}" src="${dynamicImg}" class="w-full h-full object-cover opacity-25 mix-blend-screen" loading="lazy">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-black/30"></div>
                            
                            <label class="absolute top-6 right-6 bg-emerald-500/20 hover:bg-emerald-500/50 text-emerald-300 text-xs font-medium px-3 py-1.5 rounded-xl cursor-pointer transition border border-emerald-500/30 backdrop-blur-sm">
                                📷 Changer l'image
                                <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event, '${v.verse_key}')">
                            </label>

                            <div class="absolute top-6 left-6 bg-black/60 backdrop-blur-md px-4 py-1 rounded-full text-xs font-bold border border-white/10 text-emerald-400">Verset ${v.verse_key}</div>
                        </div>
                        <div class="p-8 md:p-12 space-y-8 -mt-20 relative z-10 bg-gradient-to-b from-transparent to-[#020617]/95">
                            <div class="quran-container">
                                <p class="quran-arabic text-zinc-100" dir="rtl">${verseHtml}</p>
                            </div>
                            <div class="h-px w-24 bg-emerald-500/30 mx-auto"></div>
                            <p class="text-zinc-200 text-xl md:text-2xl font-light italic leading-relaxed max-w-2xl mx-auto">"${textFr}"</p>
                        </div>
                    </section>`;
            });
        }

        init();
    </script>
</body>
</html>
