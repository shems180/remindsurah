<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranVision</title>
    
    <link rel="manifest" href="manifest.json?v=8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/jpeg" href="logo0.jpg">
    <link rel="icon" type="image/jpeg" sizes="192x192" href="logo0.jpg">
    <link rel="apple-touch-icon" href="logo0.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        .quran-container { direction: rtl; text-align: right; }
        .quran-arabic { 
            font-family: 'Amiri', serif !important; 
            font-size: 1.6rem !important; 
            line-height: 2.3 !important; 
            display: inline-block;
            width: 100%;
            text-align: center;
            word-spacing: 2px;
        }
        .blur-bg {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* Masquage fluide de la phonétique */
        .phonetic-text.hidden {
            display: none !important;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <div class="w-full max-w-4xl space-y-6">
        <div class="blur-bg rounded-2xl p-4 flex flex-wrap gap-4 items-center justify-between shadow-2xl">
            <div class="flex items-center gap-3">
                <img src="logo0.jpg" alt="Logo" class="w-10 h-10 rounded-xl shadow-md object-cover">
                <h1 class="text-xl font-bold bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent">QuranVision</h1>
            </div>
            
            <div class="flex items-center gap-2 bg-slate-900/50 px-3 py-1.5 rounded-xl border border-slate-700">
                <input type="checkbox" id="togglePhonetic" checked class="w-4 h-4 accent-emerald-500 cursor-pointer">
                <label for="togglePhonetic" class="text-xs font-medium text-slate-300 cursor-pointer select-none">Afficher la phonétique</label>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="blur-bg rounded-xl p-3 flex flex-col gap-1">
                <label class="text-xs text-slate-400 font-medium px-1">Sourate</label>
                <select id="surahSelect" class="bg-transparent text-white font-medium focus:outline-none p-1 cursor-pointer w-full text-sm">
                    <option class="text-slate-900" value="">Chargement des sourates...</option>
                </select>
            </div>

            <div class="blur-bg rounded-xl p-3 flex flex-col gap-1">
                <label class="text-xs text-slate-400 font-medium px-1">Verset</label>
                <select id="verseSelect" class="bg-transparent text-white font-medium focus:outline-none p-1 cursor-pointer w-full text-sm" disabled>
                    <option class="text-slate-900" value="">Sélectionnez d'abord une sourate</option>
                </select>
            </div>
        </div>

        <div id="quranDisplay" class="space-y-4 min-h-[200px]">
            <div class="text-center text-slate-400 py-12">Sélectionnez une sourate pour commencer la lecture.</div>
        </div>
    </div>

    <script>
        const surahSelect = document.getElementById('surahSelect');
        const verseSelect = document.getElementById('verseSelect');
        const quranDisplay = document.getElementById('quranDisplay');
        const togglePhonetic = document.getElementById('togglePhonetic');

        let currentSurahData = null;

        // 1. Initialisation : Charger la liste des sourates au démarrage
        async function loadSurahs() {
            try {
                const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
                const data = await res.json();
                
                surahSelect.innerHTML = '<option class="text-slate-900" value="">-- Choisir une sourate --</option>';
                data.chapters.forEach(chapter => {
                    const option = document.createElement('option');
                    option.value = chapter.id;
                    option.className = 'text-slate-900';
                    option.textContent = `${chapter.id}. ${chapter.name_simple} (${chapter.translated_name.name})`;
                    surahSelect.appendChild(option);
                });
            } catch (err) {
                console.error("Erreur de chargement des sourates:", err);
                surahSelect.innerHTML = '<option class="text-slate-900" value="">Erreur de chargement</option>';
            }
        }

        // 2. Événement lors du choix d'une sourate
        surahSelect.addEventListener('change', async (e) => {
            const surahId = e.target.value;
            if (!surahId) {
                resetFields();
                return;
            }

            quranDisplay.innerHTML = '<div class="text-center text-slate-400 py-12 animate-pulse">Chargement de la sourate...</div>';
            verseSelect.disabled = true;
            verseSelect.innerHTML = '<option class="text-slate-900" value="">Chargement...</option>';

            try {
                // Récupération des versets en arabe, français et phonétique (ID 2116)
                const res = await fetch(`https://api.quran.com/api/v4/verses/by_chapter/${surahId}?language=fr&translations=136,2116&fields=text_uthmani&per_page=300`);
                const data = await res.json();
                currentSurahData = data.verses;

                // Remplir le sélecteur de versets
                verseSelect.innerHTML = '<option class="text-slate-900" value="all">Toute la sourate</option>';
                currentSurahData.forEach((verse, index) => {
                    const option = document.createElement('option');
                    option.value = verse.id;
                    option.className = 'text-slate-900';
                    option.textContent = `Verset ${index + 1}`;
                    verseSelect.appendChild(option);
                });
                verseSelect.disabled = false;

                // Afficher tous les versets par défaut
                renderVerses('all');

            } catch (err) {
                console.error("Erreur lors de la récupération de la sourate:", err);
                quranDisplay.innerHTML = '<div class="text-center text-red-400 py-12">Impossible de charger cette sourate. Réessayez.</div>';
            }
        });

        // 3. Événement lors du choix d'un verset spécifique
        verseSelect.addEventListener('change', (e) => {
            renderVerses(e.target.value);
        });

        // 4. Fonction d'affichage dynamique dans le DOM
        function renderVerses(targetId) {
            if (!currentSurahData) return;
            quranDisplay.innerHTML = '';

            const versesToRender = targetId === 'all' 
                ? currentSurahData 
                : currentSurahData.filter(v => v.id == targetId);

            const isPhoneticHidden = !togglePhonetic.checked;

            versesToRender.forEach(verse => {
                const verseBox = document.createElement('div');
                verseBox.id = `verse-${verse.verse_number}`;
                verseBox.className = 'blur-bg rounded-2xl p-6 space-y-4 shadow-lg transition-all duration-200 hover:border-slate-700/50';

                // Traduction (136) et Phonétique (2116)
                const textFrench = verse.translations.find(t => t.resource_id === 136)?.text || "Traduction indisponible";
                const textPhonetic = verse.translations.find(t => t.resource_id === 2116)?.text || "Phonétique indisponible";

                verseBox.innerHTML = `
                    <div class="flex items-center justify-between border-b border-slate-800 pb-2">
                        <span class="text-xs font-bold text-emerald-400 bg-emerald-500/10 px-2.5 py-1 rounded-full">
                            ${verse.verse_key}
                        </span>
                    </div>
                    <div class="quran-container py-2">
                        <span class="quran-arabic tracking-wide text-right text-emerald-50 font-medium">${verse.text_uthmani}</span>
                    </div>
                    <div class="space-y-2 text-left pt-2 border-t border-slate-900">
                        <p class="text-slate-200 text-sm leading-relaxed">${textFrench}</p>
                        <p class="phonetic-text text-xs italic text-teal-300/90 font-medium ${isPhoneticHidden ? 'hidden' : ''}">${textPhonetic}</p>
                    </div>
                `;
                quranDisplay.appendChild(verseBox);
            });

            // Défilement automatique fluide si un verset précis est ciblé
            if (targetId !== 'all') {
                const targetBox = document.getElementById(`verse-${versesToRender[0].verse_number}`);
                if (targetBox) {
                    targetBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        // 5. Gestionnaire pour le bouton d'affichage de la phonétique
        togglePhonetic.addEventListener('change', (e) => {
            const phonetics = document.querySelectorAll('.phonetic-text');
            phonetics.forEach(el => {
                if (e.target.checked) {
                    el.classList.remove('hidden');
                } else {
                    el.classList.add('hidden');
                }
            });
        });

        // Rétablir l'état par défaut si aucune sourate n'est choisie
        function resetFields() {
            verseSelect.innerHTML = '<option class="text-slate-900" value="">Sélectionnez d\'abord une sourate</option>';
            verseSelect.disabled = true;
            quranDisplay.innerHTML = '<div class="text-center text-slate-400 py-12">Sélectionnez une sourate pour commencer la lecture.</div>';
            currentSurahData = null;
        }

        // Démarrage
        loadSurahs();
    </script>
</body>
</html>
