<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranVision - Immersion Spirituelle</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link class="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://quran.com/fonts/fonts.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        .quran-container {
            direction: rtl;
            text-align: right;
        }
        
        /* Utilisation de la police tajweed officielle pour un alignement parfait lettre par lettre */
        .quran-arabic { 
            font-family: 'UthmanicHafs', 'Madani', serif; 
            font-size: 3.8rem; 
            line-height: 2.5; 
            display: inline-block;
            width: 100%;
            text-align: center;
        }

        /* --- STYLES INTERNES AJUSTÉS POUR CORRIGER LE DÉCALAGE --- */
        .quran-arabic span {
            display: inline-block;
            direction: rtl;
        }
        
        /* Application stricte des couleurs sur les sélecteurs natifs de l'API */
        .quran-arabic [class*="ghunnah"] { color: #10b981 !important; font-weight: inherit; } 
        .quran-arabic [class*="qalqalah"] { color: #3b82f6 !important; font-weight: inherit; } 
        .quran-arabic [class*="madd_6"], .quran-arabic [class*="madd_4"] { color: #ef4444 !important; } 
        .quran-arabic [class*="madd_2"] { color: #f43f5e !important; } 
        .quran-arabic [class*="ikhfa"] { color: #f97316 !important; } 
        .quran-arabic [class*="silent"] { color: #64748b !important; opacity: 0.5; } 

        .glass-card { 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2.5rem;
        }

        .audio-player-container {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            max-w: 450px;
            margin: 0 auto;
            padding: 8px 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        audio { height: 40px; width: 100%; outline: none; }
    </style>
</head>
