<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranVision</title>
    
    <link rel="manifest" href="manifest.json?v=3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link class="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        .quran-container { direction: rtl; text-align: right; }
        
        /* TAILLE STRICTE ET SÉCURISÉE POUR SMARTPHONE */
        .quran-arabic { 
            font-family: 'Amiri', serif !important; 
            font-size: 1.6rem !important; 
            line-height: 2.3 !important; 
            display: inline-block;
            width: 100%;
            text-align: center;
            word-spacing: 2px;
        }
        
        /* TAILLE ORDINATEUR */
        @media (min-width: 768px) {
            .quran-arabic {
                font-size: 2.8rem !important;
                line-height: 2.6 !important;
                word-spacing: 4px;
            }
        }

        .glass-card { 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2.5rem;
        }
        .audio-player-container {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            max-w: 450px;
            margin: 0 auto;
            padding: 8px 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        audio { height: 40px; width: 100%; outline: none; }
        
        .highlight {
            background-color: rgba(16, 185, 129, 0.3);
            border-bottom: 2px solid #10b981;
            padding: 0 2px;
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="sticky top-0 z-50 p-4 bg-black/70 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <h1 onclick="window.location.reload()" class="cursor-pointer text-2xl font-bold tracking-tighter text-emerald-500 flex items-center gap-2">
                    <span class="bg-emerald-500 text-black px-2 py-1 rounded-lg text-sm italic font-black">IQRA</span> QURAN<span class="text-white font-light">VISION</span>
                </h1>
                
                <button onclick="checkAdminPassword()" id="adminBadge" class="text-[10px] bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded border border-zinc-700 hover:text-white transition">
                    Connexion Admin
                </button>
                <button onclick="exportConfig()" id="exportBtn" class="hidden text-[10px] bg-emerald-900/50 text-emerald-400 px-2 py-0.5 rounded border border-emerald-700/50 hover:bg-emerald-500 hover:text-black transition">
                    📦 Télécharger le HTML mis à jour pour GitHub
                </button>
            </div>
            
            <div class="flex flex-wrap justify-center items-center gap-3">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Filtrer les versets chargés..." class="w-56 md:w-64 px-4 py-2 rounded-xl text-sm text-white bg-black/40 border border-white/10 focus:border-emerald-500 focus:outline-none">
                    <button onclick="searchLocal()" class="absolute right-3 top-2 text-emerald-400 hover:text-white transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" stroke-linecap="round"></path></svg>
                    </button>
                </div>
                <select id="surahSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs outline-none w-32 md:w-40 text-white"></select>
                <select id="reciterSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs outline-none text-white">
                    <option value="7">Mishary Alafasy</option>
                    <option value="3">Abdur-Rahman as-Sudais</option>
                    <option value="128">Yasser Ad-Dussary</option>
                </select>
                <button onclick="loadSurah()" class="bg-emerald-600 hover:bg-emerald-400 text-black font-bold px-6 py-2 rounded-xl transition-all shadow-lg shadow-emerald-900/20">Explorer</button>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-4xl mx-auto p-4 md:p-8 mt-6 space-y-12 text-center">
        <div id="welcome-screen" class="py-24 space-y-8">
            <div class="inline-block p-6 rounded-full bg-emerald-500/10 animate-pulse">
                <svg class="w-16 h-16 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5s3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <h2 class="text-4xl md:text-6xl font-bold tracking-tight">Accès QuranVision</h2>
            <p class="text-zinc-400 text-lg max-w-lg mx-auto font-light leading-relaxed">Sélectionnez une sourate ci-dessus pour charger les versets, puis utilisez la barre de recherche pour filtrer instantanément.</p>
        </div>
    </main>

    <script>
        const mainContent = document.getElementById('main-content');
        const surahSelect = document.getElementById('surahSelect');
        
        let isAdminActive = false; 
        let db;
        let currentSurahVerses = []; // Sauvegarde locale pour la recherche instantanée

        // LA ZONE OÙ S'INJECTENT TES IMAGES LORS DE L'EXPORT (indispensable pour mobile)
        const globalPublishedImages = {};

        function checkAdminPassword() {
            if (isAdminActive) { location.reload(); return; }
            const input = prompt("Entrez le mot de passe Administrateur :");
            if (input === "admin123") {
                isAdminActive = true;
                activateAdminFeatures();
            } else if (input) { alert("Mot de passe incorrect."); }
        }

        function activateAdminFeatures() {
            document.getElementById('adminBadge').innerHTML = "⚡ Déconnexion Admin";
            document.getElementById('adminBadge').className = "text-[10px] bg-red-600 text-white font-bold px-2 py-0.5 rounded";
            document.getElementById('exportBtn').style.display = "inline-block";
            document.querySelectorAll('.admin-upload-btn').forEach(btn => btn.style.display = 'block');
        }

        const dbRequest = indexedDB.open("QuranVisionDB", 1);
        dbRequest.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("images")) db.createObjectStore("images", { keyPath: "verseKey" });
        };
        dbRequest.onsuccess = function(e) { db = e.target.result; init(); };
        dbRequest.onerror = function() { init(); };

        const imageBank = {
            univers: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1200&q=80",
            balance: "https://images.unsplash.com/photo-1590523177345-420379ee050d?auto=format&fit=crop&w=1200&q=80", 
            prairie: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1200&q=80", 
            feu: "https://images.unsplash.com/photo-1524813686514-a57563d77d61?auto=format&fit=crop&w=1200&q=80",
            defaut: "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=1200&q=80"
        };

        function getFallbackImage(textFr) {
            if (!textFr) return imageBank.defaut;
            const clean = textFr.toLowerCase();
            if (clean.includes('univers')) return imageBank.univers;
            if (clean.match(/(rétribution|comptes|dernier)/)) return imageBank.balance;
            if (clean.match(/(paradis|récompense)/)) return imageBank.prairie;
            if (clean.match(/(enfer|géhenne|châtiment|feu)/)) return imageBank.feu;
            return imageBank.defaut;
        }

        function getCustomImage(verseKey, fallbackUrl, callback) {
            if (globalPublishedImages && globalPublishedImages[verseKey]) {
                callback(globalPublishedImages[verseKey]);
                return;
            }
            if (!db) { callback(fallbackUrl); return; }
            try {
                const transaction = db.transaction(["images"], "readonly");
                const store = transaction.objectStore("images");
                const request = store.get(verseKey);
                request.onsuccess = function() {
                    if (request.result) callback(request.result.data);
                    else callback(fallbackUrl);
                };
                request.onerror = function() { callback(fallbackUrl); };
            } catch(e) { callback(fallbackUrl); }
        }

        function handleImageUpload(event, verseKey) {
            const file = event.target.files[0];
            if (!file) return;
            const targetLabel = event.target.parentElement;
            targetLabel.innerHTML = "⚡ Compression...";
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxDim = 800; 
                    let w = img.width, h = img.height;
                    if (w > h && w > maxDim) { h = Math.round((h * maxDim) / w); w = maxDim; }
                    else if (h > maxDim) { w = Math.round((w * maxDim) / h); h = maxDim; }
                    canvas.width = w; canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    const optimizedDataUrl = canvas.toDataURL('image/jpeg', 0.60);

                    const transaction = db.transaction(["images"], "readwrite");
                    const store = transaction.objectStore("images");
                    store.put({ verseKey: verseKey, data: optimizedDataUrl });
                    transaction.oncomplete = function() {
                        document.getElementById(`img-view-${verseKey}`).src = optimizedDataUrl;
                        targetLabel.innerHTML = "📷 Modifier la photo";
                    };
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function init() {
            try {
                const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
                const data = await res.json();
                surahSelect.innerHTML = '';
                data.chapters.forEach(s => {
                    surahSelect.innerHTML += `<option value="${s.id}">${s.id}. ${s.name_simple}</option>`;
                });
            } catch (e) { console.error(e); }
            
            // Écouteur pour la recherche en temps réel lors de la saisie
            document.getElementById('searchInput').addEventListener('input', searchLocal);
        }

        async function loadSurah() {
            const sid = surahSelect.value;
            const rid = document.getElementById('reciterSelect').value;
            mainContent.innerHTML = `<div class="py-20 text-emerald-500 animate-bounce text-xl font-bold">CHARGEMENT DE LA SOURATE...</div>`;
            try {
                const res = await fetch(`https://api.quran.com/api/v4/verses/by_chapter/${sid}?language=fr&translations=31&fields=text_uthmani&per_page=300`);
                const data = await res.json();
                const audioRes = await fetch(`https://api.quran.com/api/v4/chapter_recitations/${rid}/${sid}`);
                const audioData = await audioRes.json();
                
                currentSurahVerses = data.verses; // On mémorise la sourate
                renderSurah(currentSurahVerses, audioData.audio_file.audio_url);
            } catch (e) { mainContent.innerHTML = "<div class='py-20 text-red-400'>Erreur de connexion.</div>"; }
        }

        function renderSurah(verses, audioUrl = null) {
            let audioHtml = "";
            if (audioUrl) {
                audioHtml = `<div class="sticky top-24 z-40 w-full mb-12 px-4"><div class="audio-player-container"><audio src="${audioUrl}" controls></audio></div></div>`;
            } else if (document.querySelector('audio')) {
                // Conserver le lecteur existant si on filtre juste le texte
                audioHtml = `<div class="sticky top-24 z-40 w-full mb-12 px-4"><div class="audio-player-container"><audio src="${document.querySelector('audio').src}" controls></audio></div></div>`;
            }
            
            let html = audioHtml;
            
            if (verses.length === 0) {
                html += `<p class="py-12 text-zinc-500">Aucun verset ne correspond à ce filtre.</p>`;
                mainContent.innerHTML = html;
                return;
            }

            verses.forEach((v) => {
                const textFr = v.translations[0].text.replace(/<[^>]*>/g, '');
                const fallbackImg = getFallbackImage(textFr);
                
                // Gestion de la surbrillance si un mot est cherché
                const query = document.getElementById('searchInput').value.trim().toLowerCase();
                let displayedFr = textFr;
                if (query && displayedFr.toLowerCase().includes(query)) {
                    const regex = new RegExp(`(${query})`, 'gi');
                    displayedFr = displayedFr.replace(regex, `<span class="highlight">$1</span>`);
                }

                html += `
                    <section id="v-${v.verse_key}" class="glass-card overflow-hidden mb-16 shadow-2xl">
                        <div class="relative h-64 w-full bg-zinc-950 flex items-center justify-center">
                            <img id="img-view-${v.verse_key}" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" class="w-full h-full object-cover opacity-25 mix-blend-screen" loading="lazy">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#020617] via-transparent to-black/30"></div>
                            <label class="admin-upload-btn absolute top-6 right-6 bg-emerald-500/20 hover:bg-emerald-500/50 text-emerald-300 text-xs font-medium px-3 py-1.5 rounded-xl cursor-pointer transition border border-emerald-500/30 backdrop-blur-sm z-20" style="display: ${isAdminActive ? 'block' : 'none'};">
                                📷 Modifier la photo
                                <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event, '${v.verse_key}')">
                            </label>
                            <div class="absolute top-6 left-6 bg-black/60 backdrop-blur-md px-4 py-1 rounded-full text-xs font-bold border border-white/10 text-emerald-400">Verset ${v.verse_key}</div>
                        </div>
                        <div class="p-6 md:p-12 space-y-6 -mt-20 relative z-10 bg-gradient-to-b from-transparent to-[#020617]/95">
                            <div class="quran-container"><p class="quran-arabic text-zinc-100" dir="rtl">${v.text_uthmani}</p></div>
                            <div class="h-px w-24 bg-emerald-500/30 mx-auto"></div>
                            <p class="text-zinc-200 text-lg md:text-xl font-light italic leading-relaxed max-w-2xl mx-auto">"${displayedFr}"</p>
                        </div>
                    </section>`;
            });
            
            mainContent.innerHTML = html;

            // Chargement asynchrone des photos
            verses.forEach((v) => {
                const textFr = v.translations[0].text.replace(/<[^>]*>/g, '');
                const fallbackImg = getFallbackImage(textFr);
                getCustomImage(v.verse_key, fallbackImg, function(finalSrc) {
                    const targetImg = document.getElementById(`img-view-${v.verse_key}`);
                    if (targetImg) targetImg.src = finalSrc;
                });
            });
        }

        // SYSTÈME DE RECHERCHE LOCAL ULTRA RAPIDE (SANS BUG D'API)
        function searchLocal() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!currentSurahVerses || currentSurahVerses.length === 0) return;
            
            if (!query) {
                renderSurah(currentSurahVerses);
                return;
            }

            const filtered = currentSurahVerses.filter(v => {
                const textFr = v.translations[0].text.toLowerCase();
                const textAr = v.text_uthmani;
                return textFr.includes(query) || textAr.includes(query);
            });

            renderSurah(filtered);
        }

        function exportConfig() {
            if (!db) { alert("Le stockage local n'est pas prêt."); return; }
            const btn = document.getElementById('exportBtn');
            btn.innerHTML = "⏳ Compilation des images...";
            btn.disabled = true;

            const transaction = db.transaction(["images"], "readonly");
            const store = transaction.objectStore("images");
            const request = store.getAll();
            
            request.onsuccess = function() {
                try {
                    const currentData = {};
                    request.result.forEach(item => { currentData[item.verseKey] = item.data; });
                    
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(document.documentElement.outerHTML, 'text/html');
                    
                    const adminBadge = doc.getElementById('adminBadge');
                    if (adminBadge) {
                        adminBadge.innerHTML = "Connexion Admin";
                        adminBadge.className = "text-[10px] bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded border border-zinc-700 hover:text-white transition";
                    }
                    const exportBtn = doc.getElementById('exportBtn');
                    if (exportBtn) exportBtn.style.display = "none";
                    
                    let htmlContent = doc.documentElement.outerHTML;
                    const regex = /const globalPublishedImages = \{[\s\S]*?\};/;
                    const newDataString = `const globalPublishedImages = ${JSON.stringify(currentData, null, 4)};`;
                    htmlContent = "<!DOCTYPE html>\n" + htmlContent.replace(regex, newDataString);
                    
                    const blob = new Blob([htmlContent], {type: "text/html;charset=utf-8"});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = "index.html";
                    document.body.appendChild(a);
                    a.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        btn.innerHTML = "📦 Télécharger le HTML mis à jour pour GitHub";
                        btn.disabled = false;
                        alert("✨ Code exporté ! Remplace ton fichier sur GitHub pour appliquer les images sur ton téléphone.");
                    }, 500);
                } catch (error) {
                    btn.innerHTML = "📦 Télécharger le HTML mis à jour pour GitHub";
                    btn.disabled = false;
                    alert("Erreur lors de l'export.");
                }
            };
        }
    </script>
</body>
</html>
