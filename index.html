<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranVision - Immersion Spirituelle</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link class="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        .quran-container {
            direction: rtl;
            text-align: right;
        }
        .quran-arabic { 
            font-family: 'Amiri', serif; 
            font-size: 3rem; 
            line-height: 2.3; 
            display: inline-block;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
        }

        /* --- COULEURS DU TAJWEED --- */
        .tjweed-v { color: #10b981 !important; font-weight: 700; } /* Vert: Ghunnah */
        .tjweed-b { color: #3b82f6 !important; font-weight: 700; } /* Bleu: Qalqalah */
        .tjweed-r { color: #ef4444 !important; font-weight: 700; } /* Rouge: Madd */
        .tjweed-o { color: #f97316 !important; }                 /* Orange */
        .tjweed-g { color: #64748b !important; opacity: 0.5; }     /* Gris: Lettres muettes */

        .glass-card { 
            background: rgba(255, 255, 255, 0.01); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06); 
            border-radius: 2.5rem;
            transition: all 0.4s ease;
        }
        .glass-card:hover { 
            border-color: rgba(16, 185, 129, 0.3); 
            transform: translateY(-2px); 
        }

        .audio-player-container {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            max-w: 450px;
            margin: 0 auto;
            padding: 8px 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }
        audio { height: 40px; width: 100%; outline: none; }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="sticky top-0 z-50 p-4 bg-black/60 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
            <h1 onclick="window.location.reload()" class="cursor-pointer text-2xl font-bold tracking-tighter text-emerald-500 flex items-center gap-2">
                <span class="bg-emerald-500 text-black px-2 py-1 rounded-lg text-sm italic font-black">IQRA</span> QURAN<span class="text-white font-light">VISION</span>
            </h1>
            
            <div class="flex flex-wrap justify-center items-center gap-3">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Recherche (ex: Moise, Ciel)..." class="w-56 md:w-64 px-4 py-2 rounded-xl text-sm text-white bg-black/40 border border-white/10 focus:border-emerald-500 focus:outline-none">
                    <button onclick="searchVerse()" class="absolute right-3 top-2 text-emerald-400 hover:text-white transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" stroke-linecap="round"></path></svg>
                    </button>
                </div>
                <select id="surahSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs outline-none w-32 md:w-40 text-white"></select>
                <select id="reciterSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs outline-none text-white">
                    <option value="7">Mishary Alafasy</option>
                    <option value="3">Abdur-Rahman as-Sudais</option>
                    <option value="128">Yasser Ad-Dussary</option>
                </select>
                <button onclick="loadSurah()" class="bg-emerald-600 hover:bg-emerald-400 text-black font-bold px-6 py-2 rounded-xl transition-all shadow-lg shadow-emerald-900/20">Explorer</button>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-4xl mx-auto p-4 md:p-8 mt-6 space-y-12 text-center">
        <div id="welcome-screen" class="py-24 space-y-8">
            <div class="inline-block p-6 rounded-full bg-emerald-500/10 animate-pulse">
                <svg class="w-16 h-16 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5s3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            </div>
            <h2 class="text-4xl md:text-6xl font-bold tracking-tight">Méditez sur les Signes.</h2>
            <p class="text-zinc-400 text-lg max-w-lg mx-auto font-light leading-relaxed">Mushaf Tajweed Complet • Couleurs & Cursive Connectée</p>
        </div>
    </main>

    <script>
        const mainContent = document.getElementById('main-content');
        const surahSelect = document.getElementById('surahSelect');
        let currentVersesList = [];

        const imageBank = {
            espace: "https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?auto=format&fit=crop&w=1200&q=80",    
            ocean: "https://images.unsplash.com/photo-1505118380757-91f5f5632de0?auto=format&fit=crop&w=1200&q=80",     
            nature: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1200&q=80",    
            montagne: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80",  
            lumiere: "https://images.unsplash.com/photo-1546587348-d12660c30c50?auto=format&fit=crop&w=1200&q=80",   
            desert: "https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9?auto=format&fit=crop&w=1200&q=80",    
            defaut: "https://images.unsplash.com/photo-1518156677180-95a2893f3e9f?auto=format&fit=crop&w=1200&q=80"     
        };

        // PARSEUR INTELLIGENT : Extrait la couleur, injecte le <span> CSS et jette les crochets
        function parseTajweed(rawText) {
            if (!rawText) return "";
            
            const mapping = {
                'g': 'tjweed-v', 'f': 'tjweed-v', 'c': 'tjweed-v', 'a': 'tjweed-v',
                'q': 'tjweed-b',
                'm': 'tjweed-r', 'o': 'tjweed-r',
                'p': 'tjweed-o', 'n': 'tjweed-o',
                's': 'tjweed-g', 'l': 'tjweed-g', 'h': 'tjweed-g'
            };

            let processed = rawText;

            // Traite les structures types [h:1][أ] -> <span class="tjweed-g">أ</span>
            processed = processed.replace(/\[([a-z0-9:]+)\]\[([^\]]+)\]/g, (match, code, char) => {
                const cleanCode = code.split(':')[0];
                const css = mapping[cleanCode];
                return css ? `<span class="${css}">${char}</span>` : char;
            });

            // Traite les balises isolées ouvrantes [m]
            processed = processed.replace(/\[([a-z0-9:]+)\]/g, (match, code) => {
                const cleanCode = code.split(':')[0];
                const css = mapping[cleanCode];
                return css ? `<span class="${css}">` : '';
            });

            // Ferme les balises structurées par l'API
            processed = processed.replace(/\]\]/g, '</span>');
            
            // Nettoyage final de sécurité (au cas où des crochets subsistent)
            return processed.replace(/[\[\]]/g, '');
        }

        function getThemeImage(textFr) {
            const clean = textFr.toLowerCase();
            if (clean.includes("mer") || clean.includes("eau") || clean.includes("fleuve") || clean.includes("pluie")) return imageBank.ocean;
            if (clean.includes("ciel") || clean.includes("cieux") || clean.includes("nuit") || clean.includes("étoile")) return imageBank.espace;
            if (clean.includes("terre") || clean.includes("jardin") || clean.includes("arbre") || clean.includes("plantes")) return imageBank.nature;
            if (clean.includes("soleil") || clean.includes("jour") || clean.includes("lumière") || clean.includes("clarté")) return imageBank.lumiere;
            if (clean.includes("montagne") || clean.includes("montagnes")) return imageBank.montagne;
            if (clean.includes("désert") || clean.includes("sable")) return imageBank.desert;
            return imageBank.defaut;
        }

        async function init() {
            try {
                const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
                const data = await res.json();
                data.chapters.forEach(s => {
                    surahSelect.innerHTML += `<option value="${s.id}">${s.id}. ${s.name_simple}</option>`;
                });
            } catch (e) { console.error(e); }
        }

        function isArabic(text) { return /[\u0600-\u06FF]/.test(text); }

        async function searchVerse() {
            let query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            mainContent.innerHTML = `<div class="py-20 text-emerald-500 animate-pulse text-xl">Recherche en cours...</div>`;
            try {
                const res = await fetch(`https://api.quran.com/api/v4/search?q=${encodeURIComponent(query)}&size=20&language=${isArabic(query) ? 'ar' : 'fr'}`);
                const data = await res.json();
                if (data.search && data.search.results && data.search.results.length > 0) {
                    renderSearchResults(data.search.results, isArabic(query));
                } else {
                    mainContent.innerHTML = "<p class='py-20 text-zinc-400'>Aucun résultat trouvé.</p>";
                }
            } catch (e) { mainContent.innerHTML = "<p class='py-20 text-red-400'>Erreur réseau.</p>"; }
        }

        function renderSearchResults(results, isAr) {
            mainContent.innerHTML = `<h2 class="text-2xl font-bold mb-8 text-emerald-500">${results.length} résultats</h2>`;
            results.forEach(r => {
                mainContent.innerHTML += `
                    <div class="glass-card p-6 mb-4 bg-white/5 border-l-4 border-emerald-500 text-left">
                        <p class="text-zinc-400 text-xs mb-2">Verset ${r.verse_key}</p>
                        <p class="text-zinc-200 ${isAr ? 'text-right font-serif text-2xl' : 'italic text-base'}">${r.text.replace(/<[^>]*>/g, '')}</p>
                        <button onclick="goToVerse('${r.verse_key}')" class="text-emerald-500 text-xs font-bold mt-4 block hover:underline">OUVRIR LA SOURATE →</button>
                    </div>`;
            });
        }

        async function goToVerse(vk) {
            surahSelect.value = vk.split(':')[0];
            await loadSurah();
            setTimeout(() => {
                const el = document.getElementById(`v-${vk}`);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 600);
        }

        async function loadSurah() {
            const sid = surahSelect.value;
            const rid = document.getElementById('reciterSelect').value;
            mainContent.innerHTML = `<div class="py-20 text-emerald-500 animate-bounce text-xl font-bold">Synchronisation...</div>`;
            
            try {
                const [vR, tajweedR, aR] = await Promise.all([
                    fetch(`https://api.quran.com/api/v4/verses/by_chapter/${sid}?language=fr&translations=31&per_page=300`),
                    fetch(`https://api.alquran.cloud/v1/surah/${sid}/quran-tajweed`),
                    fetch(`https://api.quran.com/api/v4/chapter_recitations/${rid}/${sid}`)
                ]);
                
                const vD = await vR.json();
                const tD = await tajweedR.json();
                const aD = await aR.json();
                
                currentVersesList = vD.verses;
                currentVersesList.forEach((verse, idx) => {
                    verse.text_tajweed_clean = parseTajweed(tD.data.ayahs[idx].text);
                });
                
                renderSurah(currentVersesList, aD.audio_file.audio_url);
            } catch (e) { 
                mainContent.innerHTML = "<div class='py-20 text-red-400'>Erreur d'affichage. Réessayez.</div>"; 
            }
        }

        function renderSurah(verses, audio) {
            mainContent.innerHTML = `
                <div class="sticky top-24 z-40 w-full mb-12 px-4">
                    <div class="audio-player-container"><audio src="${audio}" controls></audio></div>
                </div>`;

            verses.forEach((v, i) => {
                const textFr = v.translations[0].text.replace(/<[^>]*>/g, '');
                const dynamicImg = getThemeImage(textFr);

                mainContent.innerHTML += `
                    <section id="v-${v.verse_key}" class="glass-card overflow-hidden mb-16">
                        <div class="relative h-64">
                            <img src="${dynamicImg}" class="w-full h-full object-cover opacity-20">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#020617] to-transparent"></div>
                            <div class="absolute top-6 left-6 bg-black/50 px-4 py-1 rounded-full text-[10px] font-bold border border-white/10">Verset ${v.verse_key}</div>
                        </div>
                        <div class="p-8 md:p-12 space-y-8 -mt-12 relative z-10">
                            <div class="quran-container">
                                <p class="quran-arabic text-zinc-100" dir="rtl">${v.text_tajweed_clean}</p>
                            </div>
                            <div class="h-px w-20 bg-emerald-500/30 mx-auto"></div>
                            <p class="text-zinc-300 text-xl font-light italic leading-relaxed">"${textFr}"</p>
                        </div>
                    </section>`;
            });
        }

        init();
    </script>
</body>
</html>
