<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranVision - Mushaf Tajweed</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        .quran-container {
            direction: rtl;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            row-gap: 24px;
            padding: 20px 0;
        }
        /* Style pour forcer les images de mots Tajweed à être grandes, blanches et claires */
        .quran-word-svg {
            height: 75px;
            max-width: 150px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            transition: transform 0.2s;
        }
        .quran-word-svg:hover {
            transform: scale(1.08);
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.01); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06); 
            border-radius: 2.5rem;
        }
        .audio-player-container {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            max-w: 450px;
            margin: 0 auto;
            padding: 8px 16px;
        }
        audio { height: 40px; width: 100%; }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="sticky top-0 z-50 p-4 bg-black/60 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
            <h1 onclick="window.location.reload()" class="cursor-pointer text-2xl font-bold text-emerald-500 flex items-center gap-2">
                <span class="bg-emerald-500 text-black px-2 py-1 rounded-lg text-sm font-black">IQRA</span> QURAN<span class="text-white font-light">VISION</span>
            </h1>
            
            <div class="flex flex-wrap justify-center items-center gap-3">
                <select id="surahSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs text-white w-40"></select>
                <select id="reciterSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs text-white">
                    <option value="7">Mishary Alafasy</option>
                    <option value="3">Abdur-Rahman as-Sudais</option>
                    <option value="128">Yasser Ad-Dussary</option>
                </select>
                <button onclick="loadSurah()" class="bg-emerald-600 hover:bg-emerald-500 text-black font-bold px-6 py-2 rounded-xl text-xs transition-all">Explorer</button>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-4xl mx-auto p-4 md:p-8 mt-6 space-y-12 text-center">
        <div id="welcome-screen" class="py-24 space-y-4">
            <h2 class="text-3xl md:text-5xl font-bold text-emerald-500">Mushaf Tajweed Vectoriel</h2>
            <p class="text-zinc-400 text-sm">Génération stable et haute définition. Sans texte corrompu.</p>
        </div>
    </main>

    <script>
        const mainContent = document.getElementById('main-content');
        const surahSelect = document.getElementById('surahSelect');

        // Charger la liste des Sourates au démarrage
        async function init() {
            try {
                const res = await fetch('https://api.quran.com/api/v4/chapters?language=fr');
                const data = await res.json();
                data.chapters.forEach(s => {
                    surahSelect.innerHTML += `<option value="${s.id}">${s.id}. ${s.name_simple}</option>`;
                });
            } catch (e) { console.error(e); }
        }

        // Charger la sourate sélectionnée
        async function loadSurah() {
            const sid = surahSelect.value;
            const rid = document.getElementById('reciterSelect').value;
            mainContent.innerHTML = `<div class="py-20 text-emerald-500 animate-pulse text-lg font-medium">Génération des glyphes Tajweed HD...</div>`;
            
            try {
                // Version V4 stable demandant directement le rendu des mots sous forme d'images Tajweed (SVG)
                const [versesRes, audioRes] = await Promise.all([
                    fetch(`https://api.quran.com/api/v4/verses/by_chapter/${sid}?language=fr&translations=31&words=true&word_fields=v2_page,code_v1,code_v2,text_uthmani&per_page=300`),
                    fetch(`https://api.quran.com/api/v4/chapter_recitations/${rid}/${sid}`)
                ]);
                
                const versesData = await versesRes.json();
                const audioData = await audioRes.json();
                
                renderSurah(versesData.verses, audioData.audio_file.audio_url);
            } catch (e) { 
                console.error(e);
                mainContent.innerHTML = "<div class='py-20 text-red-400'>Erreur de connexion aux serveurs de rendu. Réessayez.</div>"; 
            }
        }

        function renderSurah(verses, audioUrl) {
            mainContent.innerHTML = `
                <div class="sticky top-24 z-40 w-full mb-12 px-4">
                    <div class="audio-player-container shadow-2xl">
                        <audio src="${audioUrl}" controls></audio>
                    </div>
                </div>`;

            verses.forEach((v) => {
                const textFr = v.translations[0].text.replace(/<[^>]*>/g, '');
                
                // Construction de la ligne de verset mot par mot à l'aide des images SVG officielles du Tajweed
                let wordsHtml = `<div class="quran-container" dir="rtl">`;
                
                if (v.words && v.words.length > 0) {
                    v.words.forEach(word => {
                        // Utilisation du dépôt de glyphes SVG de Quran.com (Spécifique au Tajweed de la page correspondante)
                        const pageNum = String(word.v2_page).padStart(3, '0');
                        // Chaque mot possède son image SVG dynamique avec le Tajweed natif coloré appliqué en usine
                        if(word.char_type_name !== "end") {
                            wordsHtml += `<img src="https://images.quran.com/images/words/tajweed/${word.text_uthmani ? encodeURIComponent(word.text_uthmani) : word.id}.svg" 
                                               onerror="this.style.display='none'; this.after('${word.text_uthmani || ''} ')" 
                                               class="quran-word-svg" alt="mot">`;
                        } else {
                            // Symbole de fin de verset (Ayah)
                            wordsHtml += `<span class="text-emerald-500 font-bold text-2xl self-center mx-2">﴿${v.verse_number}﴾</span>`;
                        }
                    });
                }
                wordsHtml += `</div>`;

                mainContent.innerHTML += `
                    <section class="glass-card p-8 md:p-12 mb-8 bg-white/[0.01] text-center space-y-6">
                        <div class="text-left text-xs font-bold text-emerald-500/70 tracking-wider">VERSET ${v.verse_key}</div>
                        
                        <div class="my-4">
                            ${wordsHtml}
                        </div>
                        
                        <div class="h-px w-16 bg-emerald-500/20 mx-auto"></div>
                        
                        <p class="text-zinc-300 text-lg md:text-xl font-light italic">"${textFr}"</p>
                    </section>`;
            });
        }

        init();
    </script>
</body>
</html>
