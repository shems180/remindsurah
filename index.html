<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranVision</title>
    
    <link rel="manifest" href="manifest.json?v=10">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link class="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        .quran-container { 
            direction: rtl; 
            text-align: right; 
        }
        .quran-arabic { 
            font-family: 'Amiri', serif !important; 
            font-size: 2rem !important; 
            line-height: 2.5 !important; 
            display: inline-block;
            width: 100%;
            text-align: center;
            word-spacing: 4px;
        }
        @media (min-width: 768px) {
            .quran-arabic { 
                font-size: 2.8rem !important; 
                line-height: 3 !important; 
            }
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2.5rem;
        }
        .audio-player-container {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            max-w: 450px;
            margin: 0 auto;
            padding: 8px 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        audio { 
            height: 40px; 
            width: 100%; 
            outline: none; 
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="sticky top-0 z-50 p-4 bg-black/70 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
            
            <div class="flex flex-wrap items-center justify-center gap-4">
                <h1 onclick="window.location.reload()" class="cursor-pointer text-2xl font-bold tracking-tighter text-emerald-500 flex items-center gap-2">
                    <span class="bg-emerald-500 text-black px-2 py-1 rounded-lg text-sm italic font-black">IQRA</span> QURAN<span class="text-white font-light">VISION</span>
                </h1>
                <button onclick="checkAdminPassword()" id="adminBadge" class="text-[10px] bg-red-600 text-white font-bold px-2 py-0.5 rounded transition hover:bg-red-700">⚡ Déconnexion Admin</button>
                <button onclick="exportConfig()" id="exportBtn" class="text-[10px] bg-emerald-900/50 text-emerald-400 px-2 py-0.5 rounded border border-emerald-700/50 hover:bg-emerald-500 hover:text-black transition inline-block">📦 Télécharger le HTML mis à jour</button>
            </div>
            
            <div class="flex flex-wrap justify-center items-center gap-3">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Recherche (ex: Moise, Paradis)..." class="w-56 md:w-64 px-4 py-2 rounded-xl text-sm text-white bg-black/40 border border-white/10 focus:border-emerald-500 focus:outline-none">
                    <button onclick="searchVerse()" class="absolute right-3 top-2 text-emerald-400 hover:text-white transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" stroke-linecap="round"></path>
                        </svg>
                    </button>
                </div>
                
                <select id="surahSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs outline-none w-32 md:w-40 text-white">
                    <option value="1">1. Al-Fatihah</option>
                    <option value="2">2. Al-Baqarah</option>
                    <option value="3">3. Ali 'Imran</option>
                    <option value="114">114. An-Nas</option>
                </select>

                <select id="reciterSelect" class="bg-zinc-900 border border-zinc-700 px-3 py-2 rounded-xl text-xs outline-none text-white">
                    <option value="alafasy">Mishary Alafasy</option>
                    <option value="sudais">Abdur-Rahman as-Sudais</option>
                    <option value="dussary">Yasser Ad-Dussary</option>
                </select>
                
                <button onclick="loadSurah()" class="bg-emerald-600 hover:bg-emerald-400 text-black font-bold px-6 py-2 rounded-xl transition-all">Explorer</button>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-4xl mx-auto p-4 md:p-8 mt-6 space-y-12 text-center">
        
        <div class="sticky top-24 z-40 w-full mb-12 px-4">
            <div class="audio-player-container">
                <audio id="audioPlayer" src="https://download.quranicaudio.com/qdc/mishari_al_afasy/murattal/1.mp3" controls></audio>
            </div>
        </div>
        
        <section class="glass-card overflow-hidden mb-16 shadow-2xl">
            <div class="relative p-6 flex flex-col items-center justify-center bg-zinc-950/30 border-b border-white/5">
                <span id="verseBadge" class="absolute top-4 left-4 z-10 bg-black/60 text-emerald-400 text-xs px-3 py-1 rounded-full font-bold border border-emerald-500/30">Sourate 1</span>
                
                <div id="imagePlaceholder" class="w-full text-center py-4 text-zinc-500 font-medium text-xs tracking-wider uppercase bg-black/20 rounded-xl max-w-md mx-auto my-2 border border-white/5">
                     ⚠️ Image indisponible pour le moment
                </div>
            </div>
            
            <div class="p-6 md:p-8 bg-zinc-900/50">
                <div class="quran-container mb-6">
                    <div id="quranText" class="quran-arabic text-emerald-300">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Base de données fixe contenant tes textes parfaits pour éviter les bugs d'API sur la police
        const quranData = {
            "1": {
                text: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ۝ الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ ۝ الرَّحْمَٰنِ الرَّحِيمِ ۝ مَالِكِ يَوْمِ الدِّينِ ۝ إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ ۝ اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ ۝ صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ",
                name: "Sourate 1 - Al-Fatihah"
            },
            "2": {
                text: "الم ۝ ذَٰلِكَ الْكِتَابُ لَا رَيْبَ ۛ فِيهِ ۛ هُدًى لِّلْمُتَّقِينَ ۝ الَّذِينَ يُؤْمِنُونَ بِالْغَيْبِ وَيُقِيمُونَ الصَّلَاةَ وَمِمَّا رَزَقْنَاهُمْ يُنفِقُونَ",
                name: "Sourate 2 - Al-Baqarah (Début)"
            },
            "3": {
                text: "الم ۝ اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۝ نَزَّلَ عَلَيْكَ الْكِتَابَ بِالْحَقِّ مُصَدِّقًا لِّمَا بَيْنَ يَدَيْهِ وَأَنزَلَ التَّوْرَاةَ وَالْإِنجِيلَ",
                name: "Sourate 3 - Ali 'Imran (Début)"
            },
            "114": {
                text: "قُلْ أَعُوذُ بِرَبِّ النَّاسِ ۝ مَلِكِ النَّاسِ ۝ إِلَٰهِ النَّASِ ۝ مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ ۝ الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ ۝ مِنَ الْجِنَّةِ وَالنَّاسِ",
                name: "Sourate 114 - An-Nas"
            }
        };

        function loadSurah() {
            const surahNumber = document.getElementById('surahSelect').value;
            const reciter = document.getElementById('reciterSelect').value;
            
            const audioPlayer = document.getElementById('audioPlayer');
            const quranTextDiv = document.getElementById('quranText');
            const verseBadge = document.getElementById('verseBadge');

            // 1. Mise à jour de l'audio selon le récitant choisi
            const formattedSurah = String(surahNumber).padStart(3, '0');
            if(reciter === 'alafasy') {
                audioPlayer.src = `https://download.quranicaudio.com/qdc/mishari_al_afasy/murattal/${surahNumber}.mp3`;
            } else if(reciter === 'sudais') {
                audioPlayer.src = `https://download.quranicaudio.com/qdc/abdurrahman_as_sudais/murattal/${surahNumber}.mp3`;
            } else {
                audioPlayer.src = `https://server11.mp3quran.net/yasser/${formattedSurah}.mp3`;
            }
            audioPlayer.load();
            audioPlayer.play().catch(e => console.log("Lecture automatique bloquée par le navigateur"));

            // 2. Changement du texte à l'écran (sans passer par l'API externe pour garder tes belles lettres)
            if (quranData[surahNumber]) {
                quranTextDiv.innerText = quranData[surahNumber].text;
                verseBadge.innerText = quranData[surahNumber].name;
            }
        }

        // Tes fonctions d'origine pour les boutons
        function checkAdminPassword() { alert("Action Admin déconnectée."); }
        function exportConfig() { alert("Téléchargement du fichier HTML."); }
        function searchVerse() { alert("Recherche..."); }
    </script>
</body>
</html>
