<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Site avec Compteur d'Appareils</title>
    <style>
        /* Style général de la page (vous pouvez le modifier ou le supprimer) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        /* Style de la zone du compteur */
        .compteur-box {
            margin-top: 20px;
            font-size: 18px;
            color: #7f8c8d;
        }

        #chiffre-compteur {
            display: block;
            font-size: 48px;
            font-weight: bold;
            color: #2ecc71; /* Couleur verte pour le chiffre */
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bienvenue sur mon site</h1>
        <p>Le contenu de votre page se trouve ici.</p>
        
        <hr style="border: 0; height: 1px; background: #eee; margin: 20px 0;">

        <div class="compteur-box">
            Nombre d'appareils uniques détectés :
            <span id="chiffre-compteur">0</span>
        </div>
    </div>

    <script>
        function gererCompteurAppareil() {
            // 1. Récupération du total actuel stocké dans le navigateur
            let totalAppareils = localStorage.getItem('global_device_count') 
                ? parseInt(localStorage.getItem('global_device_count')) 
                : 0;
            
            // 2. Vérification de l'empreinte de l'appareil
            let cetAppareilEstConnu = localStorage.getItem('appareil_deja_visite');

            if (!cetAppareilEstConnu) {
                // Si l'appareil n'est jamais venu, on le marque
                localStorage.setItem('appareil_deja_visite', 'true');
                
                // On incrémente le compteur de 1
                totalAppareils += 1;
                localStorage.setItem('global_device_count', totalAppareils);
            }

            // 3. Mise à jour de l'affichage sur l'écran
            const elementCompteur = document.getElementById('chiffre-compteur');
            if (elementCompteur) {
                elementCompteur.innerText = totalAppareils;
            }
        }

        // Écouteur d'événement sécurisé : ne remplace et ne modifie aucun autre code
        window.addEventListener('DOMContentLoaded', gererCompteurAppareil);
    </script>

</body>
</html>
